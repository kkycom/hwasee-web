name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install function dependencies
        working-directory: functions
        run: npm ci
      - name: Deploy all functions
        run: npx firebase-tools deploy --only functions --project hwasee-bang --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
