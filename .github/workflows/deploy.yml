name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # 완결된 이야기를 정적 페이지(bang/story/{id}/index.html)로 미리 생성 —
      # 애드센스 저가치콘텐츠 반려 대응. 신규 기능이라 이 스텝이 실패해도
      # (예: 시크릿 미등록) 사이트 전체 배포까지 막지 않게 continue-on-error.
      - name: Build static story pages
        run: node scripts/build-static-stories.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        continue-on-error: true
      # upload-pages-artifact는 .gitignore를 안 보고 이 시점의 디스크 내용을
      # 그대로 올림 — npm ci로 생긴 node_modules(빌드 전용, firebase-admin
      # 의존성 트리)가 그대로 라이브 사이트에 배포되고 있었음(디버그방 발견,
      # curl로 https://hwasee.me/node_modules/... 200 확인). 빌드 산출물이
      # 아닌 빌드 도구 자체는 배포 전에 제거.
      - name: Remove build-only files before deploy
        run: rm -rf node_modules package.json package-lock.json scripts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - name: Retry deploy (1)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        run: sleep 20
      - name: Retry deploy (2)
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
