// ─── 분기 읽기 트리 ─────────────────────────────────────
window._branchChoice = {}; // episode_id → chosen sub_id
window._storyData   = null;

function getEpisodeTree(episodes, submissions) {
  const subToChildEps = {};
  episodes.forEach(ep => {
    if (ep.parent_sub_id) {
      if (!subToChildEps[ep.parent_sub_id]) subToChildEps[ep.parent_sub_id] = [];
      subToChildEps[ep.parent_sub_id].push(ep);
    }
  });
  const rootEp = episodes.find(ep => !ep.parent_sub_id || ep.parent_sub_id === '');
  if (!rootEp) return null;

  function buildNode(ep) {
    const adoptedSubs = submissions.filter(s =>
      s.episode_id === ep.episode_id && (s.is_adopted === true || s.is_adopted === 'TRUE')
    );
    const children = adoptedSubs.flatMap(sub => (subToChildEps[sub.sub_id] || []).map(buildNode));
    return { ep, adoptedSubs, children };
  }
  return buildNode(rootEp);
}

function renderEpisodeTreeHtml(node, choices) {
  if (!node) return '';
  const { ep, adoptedSubs, children } = node;
  if (ep.status !== 'closed') return '';
  if (adoptedSubs.length === 0) return '';

  if (adoptedSubs.length === 1) {
    const sub = adoptedSubs[0];
    const childHtml = children.length === 1 ? renderEpisodeTreeHtml(children[0], choices) : '';
    return `
      <div class="prose-line">
        <span class="prose-sentence">${esc(sub.content)}</span>
        <span class="prose-author">— ${sub.author_badge?`<span class="badge badge-${sub.author_badge}" style="font-size:9px;padding:1px 4px;margin-right:2px">${badgeLabel(sub.author_badge)}</span>`:''}${esc(sub.author_nickname || '익명')}</span>
      </div>${childHtml}`;
  }

  // 분기 포인트 (동률 채택)
  const chosenSubId = choices[ep.episode_id];
  if (chosenSubId) {
    const chosenSub   = adoptedSubs.find(s => s.sub_id === chosenSubId);
    const chosenChild = children.find(c => c.ep.parent_sub_id === chosenSubId);
    return `
      <div style="margin:4px 0 -2px">
        <div class="branch-indicator">
          <span style="font-size:10px;color:var(--muted);margin-right:4px">분기</span>
          ${adoptedSubs.map((sub, i) => `
            <button class="branch-tab ${sub.sub_id === chosenSubId ? 'active' : ''}"
              onclick="chooseBranch('${ep.episode_id}','${sub.sub_id}')">
              ${String.fromCharCode(65+i)}갈래</button>`).join('')}
        </div>
        <div class="prose-line">
          <span class="prose-sentence">${esc(chosenSub ? chosenSub.content : '')}</span>
          <span class="prose-author">— ${chosenSub&&chosenSub.author_badge?`<span class="badge badge-${chosenSub.author_badge}" style="font-size:9px;padding:1px 4px;margin-right:2px">${badgeLabel(chosenSub.author_badge)}</span>`:''}${esc(chosenSub?(chosenSub.author_nickname||'익명'):'')}</span>
        </div>
      </div>
      ${chosenChild ? renderEpisodeTreeHtml(chosenChild, choices) : ''}`;
  }

  // 아직 선택 안 한 갈림길 → chooser 표시
  return `
    <div class="branch-chooser">
      <div class="branch-chooser-label">✦ 이야기의 갈림길 ✦</div>
      <div class="branch-choices">
        ${adoptedSubs.map((sub, i) => `
          <button class="branch-choice-card" onclick="chooseBranch('${ep.episode_id}','${sub.sub_id}')">
            <div class="branch-choice-label">${String.fromCharCode(65+i)}갈래</div>
            <div>${esc(sub.content)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">▲ ${sub.vote_count}표</div>
          </button>`).join('')}
      </div>
    </div>`;
}

function toggleProseAuthors(btn) {
  const prose = document.getElementById('story-prose-wrap');
  if (!prose) return;
  const showing = btn.dataset.showing === '1';
  prose.querySelectorAll('.prose-author').forEach(el => el.classList.toggle('visible', !showing));
  btn.dataset.showing = showing ? '0' : '1';
  btn.textContent = showing ? '글쓴이 보기 ▾' : '글쓴이 숨기기 ▴';
}

function chooseBranch(episode_id, sub_id) {
  window._branchChoice = window._branchChoice || {};
  window._branchChoice[episode_id] = sub_id;
  const el = document.getElementById('story-prose-content');
  if (el && window._storyData) {
    const { episodes, submissions } = window._storyData;
    const tree = getEpisodeTree(episodes, submissions);
    el.innerHTML = tree ? renderEpisodeTreeHtml(tree, window._branchChoice) : '';
  }
}

// ─── MVP 따봉 ─────────────────────────────────────────

let _mvpSelected = [];

async function loadMvpSection(story_id, submissions) {
  const el = document.getElementById('mvp-section');
  if (!el) return;

  // 채택된 제출의 고유 작성자 목록 (SYSTEM 제외)
  const winners = submissions.filter(s => s.is_adopted === true || s.is_adopted === 'TRUE');
  const seenIds = new Set();
  const authors = [];
  winners.forEach(s => {
    if (!seenIds.has(s.author_id) && s.author_id && s.author_id !== 'SYSTEM') {
      seenIds.add(s.author_id);
      authors.push({ user_id: s.author_id, nickname: s.author_nickname || '익명', badge: s.author_badge || 'seed' });
    }
  });

  if (authors.length < 2) { el.innerHTML = ''; return; }

  const res = await api('getMvpVotes', { story_id });
  _mvpSelected = [];

  if (!res.ok) { el.innerHTML = ''; return; }

  el.innerHTML = renderMvpHtml(story_id, authors, res);
}

function renderMvpHtml(story_id, authors, res) {
  const canVote = user && !res.has_voted;
  const maxCount = Math.max(...res.votes.map(v => v.count), 1);

  const authorHtml = authors.map(a => {
    const voteData = res.votes.find(v => v.user_id === a.user_id);
    const count    = voteData ? voteData.count : 0;
    if (canVote) {
      return `
        <div class="mvp-author-card" id="mvp-${a.user_id}" onclick="toggleMvpVote('${story_id}','${a.user_id}','${esc(a.nickname)}')">
          <span class="badge badge-${a.badge}" style="font-size:9px;padding:1px 5px">${badgeLabel(a.badge)}</span>
          <span style="font-size:14px;font-weight:600;flex:1">${esc(a.nickname)}</span>
          <span style="font-size:20px">🤍</span>
        </div>`;
    } else {
      return `
        <div class="mvp-author-card result">
          <span class="badge badge-${a.badge}" style="font-size:9px;padding:1px 5px">${badgeLabel(a.badge)}</span>
          <span style="font-size:14px;font-weight:600;flex:1">${esc(a.nickname)}</span>
          ${count > 0 ? `
            <div class="mvp-bar" style="max-width:80px"><div class="mvp-bar-fill" style="width:${Math.round(count/maxCount*100)}%"></div></div>
            <span style="font-size:12px;color:var(--accent);font-weight:700;min-width:28px;text-align:right">${count}</span>` : ''}
        </div>`;
    }
  }).join('');

  return `
    <div class="mvp-section">
      <div style="font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:4px">✦ 이 이야기에서 가장 빛났어요</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">
        ${canVote ? '이 이야기에서 가장 빛났던 문장을 써준 분을 한 명 선택해주세요. 선정된 분께 10p가 지급됩니다.' : `${res.total_voters}명이 참여했어요.`}
      </div>
      ${authorHtml}
      ${canVote ? `<button id="mvp-submit-btn" class="btn btn-primary" style="width:100%;margin-top:8px" onclick="submitMvpVote('${story_id}')" disabled>선택 완료</button>` : ''}
      ${!user ? `<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px">로그인 후 투표할 수 있어요.</div>` : ''}
    </div>`;
}

function toggleMvpVote(story_id, user_id, nickname) {
  const idx = _mvpSelected.indexOf(user_id);
  if (idx >= 0) {
    _mvpSelected.splice(idx, 1);
    document.getElementById('mvp-' + user_id)?.classList.remove('selected');
  } else {
    if (_mvpSelected.length >= 1) {
      const prev = _mvpSelected.shift();
      document.getElementById('mvp-' + prev)?.classList.remove('selected');
    }
    _mvpSelected.push(user_id);
    document.getElementById('mvp-' + user_id)?.classList.add('selected');
  }
  const btn = document.getElementById('mvp-submit-btn');
  if (btn) btn.disabled = _mvpSelected.length === 0;
}

async function submitMvpVote(story_id) {
  if (!_mvpSelected.length) return;
  const btn = document.getElementById('mvp-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = '투표 중...'; }
  const res = await api('voteMvp', { story_id, nominated_user_ids: _mvpSelected });
  if (!res.ok) { toast(res.error, true); if (btn) btn.disabled = false; return; }
  toast('투표 완료! 감사합니다 ✦');
  // 결과 새로 불러오기
  if (window._storyData) loadMvpSection(story_id, window._storyData.submissions);
}

// ─── 공유 ──────────────────────────────────────────────
function shareStory() {
  const d = window._storyData;
  if (!d) return;
  const { episodes, submissions, story } = d;

  const tree = getEpisodeTree(episodes.filter(e => e.status === 'closed'), submissions);

  function collectLines(node, choices) {
    if (!node || node.ep.status !== 'closed' || !node.adoptedSubs.length) return [];
    const chosenId = (choices || {})[node.ep.episode_id];
    const sub = (chosenId && node.adoptedSubs.find(s => s.sub_id === chosenId))
      || node.adoptedSubs[0];
    const child = node.children.find(c => c.ep.parent_sub_id === sub.sub_id);
    return [sub.content, ...collectLines(child, choices)];
  }

  const lines = collectLines(tree, window._branchChoice || {});
  const opening = story ? story.opening : '';
  const url = location.href;

  const text = [
    '화씨.방에서 함께 쓴 이야기',
    '',
    opening,
    ...lines,
    '',
    `👉 ${url}`,
  ].join('\n');

  navigator.clipboard.writeText(text)
    .then(() => toast('이야기가 클립보드에 복사됐습니다!'))
    .catch(() => toast('복사 실패 — 브라우저 권한을 확인해주세요.', true));
}

function reasonLabel(r) {

    direct:'채택 (직접 제출)', source:'다듬기 원저자 보상', mid:'중간 다듬기 보상', derived:'다듬기 채택 보상',

let _dnProfileTimer;
async function checkDnAvailProfile() {
  const el = document.getElementById('dn-new');

// ─── 유틸 ─────────────────────────────────────────────────

function updateCount(inputId, countId) {
  const len = (document.getElementById(inputId).value || '').length;
  const el  = document.getElementById(countId);
  if (!el) return;
  const limit = inputId.includes('opening') ? null : 50;
  if (!limit) {
    el.textContent = `${len}자`;
    el.className = 'char-count';
  } else if (len > limit) {
    el.textContent = `${len} / ${limit}자`;
    el.className = 'char-count over';
  } else if (len >= 40) {
    el.textContent = `${len} / ${limit}자`;
    el.className = 'char-count warn';
  } else {
    el.textContent = `${len}자`;
    el.className = 'char-count';
  }
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60)    return '방금 전';
  if (diff < 3600)  return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return Math.floor(diff/86400) + '일 전';
}

function parseHash() {
  const h     = location.hash.slice(1) || 'seed';
  const parts = h.split('/');
  const route = parts[0];
  currentRoute = ['home','seed','popular','mine','done','story','episode','auth','profile','create'].includes(route) ? route : 'seed';
  currentParam = parts[1] || null;
}

window.addEventListener('hashchange', () => { parseHash(); render(); renderNav(); });

function _startCountdowns() {
  setInterval(() => {
    document.querySelectorAll('.pending-countdown[data-expires]').forEach(el => {
      const exp = el.dataset.expires;
      if (!exp) return;
      const ms = new Date(exp) - Date.now();
      if (ms <= 0) { el.textContent = '⏳ 채택 임박!'; return; }
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      el.textContent = m > 0
        ? `⏳ ${m}분 ${String(s).padStart(2,'0')}초 후 채택`
        : `⏳ ${s}초 후 채택`;
    });
  }, 1000);
}

    const session = await fbGetSession(token);
    if (!session) saveUser(null);
  }
  parseHash();
  render();
  _startCountdowns();
};
