<style>
  :root {
    --bg:      #f0ead8;
    --surface: #e6dac8;
    --card:    #ddd0b8;
    --border:  #c4b090;
    --accent:  #80978c;
    --accent2: #c8823a;
    --text:    #1c0e06;
    --muted:   #7a5c40;
    --success: #5a7a3a;
    --radius:  12px;
    --font:    'Noto Sans KR', system-ui, sans-serif;
    --serif:   'Gowun Batang', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── 헤더 */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(240,234,216,.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 20px; font-weight: 400; letter-spacing: .5px;
    font-family: 'GyelonggiBatang', var(--serif); color: var(--text); cursor: pointer;
  }
  .nav-right { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
  @media (max-width: 480px) {
    .nav-right { gap: 4px; }
    .nav-right .btn-sm { padding: 4px 8px; font-size: 12px; }
  }

  /* ── 프로필 드롭다운 */
  .profile-menu-wrap { position: relative; }
  .profile-menu-btn  { background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; line-height: 1.4; }
  .profile-menu-btn:hover { background: var(--surface); }
  .profile-menu-btn .caret { font-size: 9px; color: var(--muted); transition: transform .15s; }
  .profile-menu-btn.open .caret { transform: rotate(180deg); }
  .profile-dropdown {
    display: none; position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); min-width: 168px; z-index: 200;
    overflow: hidden;
  }
  .profile-dropdown.open { display: block; }
  .profile-dropdown-header { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); }
  .profile-dropdown-nick { font-size: 13px; font-weight: 700; color: var(--text); }
  .profile-dropdown-badge { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .profile-dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; font-size: 13px; color: var(--text);
    background: none; border: none; width: 100%; text-align: left; cursor: pointer;
    transition: background .1s;
  }
  .profile-dropdown-item:hover { background: var(--surface); }
  .profile-dropdown-item.danger { color: #f87171; }
  .profile-dropdown-divider { height: 1px; background: var(--border); margin: 2px 0; }

  /* ── 버튼 */
  .btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; }
  .btn-primary { background: var(--accent); color: #3a5548; font-weight: 550; }
  .btn-primary:hover { background: #6b8278; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-ghost.active { background: var(--accent); color: #3a5548; border-color: var(--accent); }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-nav { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 8px; font-size: 13px; font-weight: 500; border-radius: 6px; line-height: 1.4; display:inline-flex; align-items:center; }
  .btn-nav:hover { color: var(--text); background: var(--surface); }
  .story-card-wrap { position:relative; margin-bottom:12px; }
  .story-card-wrap > .story-card { margin-bottom:0; }
  .card-stickers {
    position:absolute; top:0; right:12px;
    display:flex; gap:4px; pointer-events:none;
  }
  .card-branch-sticker, .card-bookmark-sticker {
    background:#c8b898; color:#5a4030;
    border:1px solid rgba(154,104,64,.25); border-top:none;
    font-size:10px; font-weight:700; padding:2px 8px;
    border-radius:0 0 5px 5px; letter-spacing:.04em;
  }
  .card-bookmark-sticker { color:#a06020; border-color:rgba(200,130,58,.35); }

  @keyframes boost-glow {
    0%, 100% { border-color:rgba(200,130,58,.45); box-shadow:0 0 10px rgba(200,130,58,.1); }
    50%       { border-color:rgba(200,130,58,.85); box-shadow:0 0 22px rgba(200,130,58,.22); }
  }
  .story-card-wrap.has-boost > .story-card { animation:boost-glow 2.2s ease-in-out infinite; border-width:2px; }
  @keyframes boost-section-glow {
    0%, 100% { border-color:rgba(200,130,58,.3); box-shadow:0 0 14px rgba(200,130,58,.08); }
    50%       { border-color:rgba(200,130,58,.65); box-shadow:0 0 28px rgba(200,130,58,.18); }
  }
  .boost-section {
    border:1.5px solid rgba(200,130,58,.3); border-radius:var(--radius);
    padding:14px 16px 10px; margin-bottom:16px;
    animation:boost-section-glow 2.6s ease-in-out infinite;
  }
  .boost-section-label { font-size:11px; font-weight:700; color:rgba(160,90,20,.85); letter-spacing:.06em; margin-bottom:12px; }
  .boost-scroll { display:flex; gap:12px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; padding-bottom:2px; }
  .boost-scroll::-webkit-scrollbar { display:none; }
  .boost-card-wrap { min-width:300px; max-width:300px; flex-shrink:0; }
  .sort-btn { background:var(--surface); border:none; color:var(--muted); padding:5px 12px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer; transition:.15s; }
  .sort-btn.active { background:var(--accent); color:#3a5548; }

  /* ── 레이아웃 */
  main { max-width: 720px; margin: 0 auto; padding: 32px 16px 48px; }

  /* ── 랭킹 (씨앗 탭 하단 인라인 + 모달 공용) */
  .lb-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 12px; font-weight: 800; color: var(--muted); width: 16px; text-align: center; flex-shrink: 0; }
  .lb-rank.r1 { color: #ffd700; }
  .lb-rank.r2 { color: #b0b0b8; }
  .lb-rank.r3 { color: #cd7f32; }
  .lb-name { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-value { font-size: 11px; color: var(--text); font-weight: 700; white-space: nowrap; flex-shrink: 0; }

  /* ── 랭킹 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 360px; max-height: 80vh; overflow-y: auto; }

  /* ── 카드 */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }

  /* ── 배지 */
  .badge { display: inline-flex; align-items: center; padding: 1px 4px; border-radius: 20px; font-size: 11px; font-weight: 700; vertical-align: middle; }
  /* 씨앗 — 베이지/갈색 */
  .badge-seed    { background: #ede0c8; color: #7a5030; }
  .badge-seed1   { background: #e8d8b8; color: #8a5a28; }
  .badge-seed2   { background: #e4d0a8; color: #9a6020; }
  /* 새싹 — 연두 */
  .badge-sprout  { background: #ddeedd; color: #3a7a38; }
  .badge-sprout1 { background: #d4eadc; color: #2a7040; }
  .badge-sprout2 { background: #c8e8d0; color: #1a6838; }
  /* 잎 — 세이지 그린 */
  .badge-leaf    { background: #dce8e4; color: #4a6a5a; }
  .badge-leaf1   { background: #d4e4e0; color: #3a6858; }
  .badge-leaf2   { background: #cce0d8; color: #2a6850; }
  /* 꽃 — 핑크 */
  .badge-bud     { background: #f0dce8; color: #a84878; }
  .badge-flower  { background: #ecd4e4; color: #b83870; }
  .badge-flower1 { background: #e8cce0; color: #c82068; }
  /* 열매 — 붉은 */
  .badge-fruit   { background: #f0d8d8; color: #a83838; }
  .badge-treeguard { background: #d0ecdc; color: #1a7040; border: 1px solid #2a9050; }
  /* 레거시 뱃지 (기존 가입자) */
  .badge-new     { background: #ede0c8; color: #7a5030; }
  .badge-rookie  { background: #ddeedd; color: #3a7a38; }
  .badge-writer  { background: #dce8e4; color: #4a6a5a; }
  .badge-expert  { background: #f0dce8; color: #a84878; }
  .badge-master  { background: #f0d8d8; color: #a83838; }

  /* ── 폼 */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input, textarea {
    width: 100%; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 15px;
    outline: none; transition: .15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .char-count { font-size: 12px; color: var(--muted); text-align: right; margin-top: 4px; }
  .char-count.warn { color: #e0a040; }
  .char-count.over { color: var(--accent2); }

  /* ── 홈 스토리 카드 */
  .story-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 12px; cursor: pointer; transition: .15s; position: relative;
  }
  .story-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(154,104,64,.18); }
  .story-card-title { font-size: 15px; line-height: 1.6; margin-bottom: 10px; font-family: var(--serif); }
  .story-card-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .step-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600;
  }
  .step-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .story-status { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .status-active    { background: rgba(90,122,58,.15); color: #3a6820; }
  .status-completed { background: rgba(0,0,0,.08); color: var(--muted); }

  /* ── 스토리 뷰 타임라인 */
  .story-timeline { position: relative; }
  .tl-item { display: flex; gap: 0; margin-bottom: 6px; }
  .tl-spine {
    display: flex; flex-direction: column; align-items: center;
    min-width: 40px; flex-shrink: 0;
  }
  .tl-spine-line { width: 2px; background: var(--border); flex: 1; min-height: 8px; }
  .tl-spine-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--bg);
  }
  .tl-body { flex: 1; padding: 0 0 16px 12px; }
  .tl-label { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
  .tl-bubble {
    border-radius: 10px; padding: 13px 16px;
    font-size: 15px; line-height: 1.7; font-family: var(--serif);
  }
  .tl-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── 투표 제출 카드 */
  .vote-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; transition: .15s;
  }
  .vote-card.clickable { cursor: pointer; }
  .vote-card.clickable:hover { background: rgba(128,151,140,.08); }
  .vote-card.selected { border-color: var(--accent); background: rgba(154,104,64,.12); box-shadow: 0 0 0 2px var(--accent); }
  .vote-card.adopted  { border-color: var(--success); }
  .vote-content { font-size: 15px; line-height: 1.75; margin-bottom: 14px; font-family: var(--serif); }
  .vote-meta { display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .vote-count { color: var(--accent); font-weight: 700; white-space: nowrap; }
  .vote-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
  .vote-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .4s; }

  /* ── 댓글 */
  .comment-list { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .comment-item { display:flex; align-items:baseline; gap:6px; padding: 7px 0; font-size: 13px; border-bottom: 1px solid var(--border); line-height: 1.5; }
  .comment-item:last-child { border-bottom: none; }
  .comment-body { flex:1; }
  .comment-author { color: var(--muted); font-size: 11px; margin-right: 6px; }
  .comment-time   { color: var(--muted); font-size: 11px; margin-left: 8px; }
  .comment-del-btn { background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer; padding:0 2px; flex-shrink:0; }
  .comment-del-btn:hover { color:#e57373; }
  .comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .comment-input-row input { flex: 1; font-size: 13px; padding: 7px 12px; }

  /* ── 현재 투표 섹션 */
  .voting-header {
    background: linear-gradient(135deg,#e0d4bc,#d8ccb0);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  /* ── 알림 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 20px; font-size: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.18); z-index: 9999;
    opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--accent2); }

  /* ── 홈 탭 (4개, 가로 스크롤) */
  .home-tabs {
    display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  .home-tab {
    flex: 1; text-align: center; padding: 12px 8px; font-size: 13px; font-weight: 600;
    background: none; border: none; border-bottom: 2px solid transparent;
    border-right: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: .15s;
    white-space: nowrap; margin-bottom: -1px;
  }
  .home-tab:last-child { border-right: none; }
  .home-tab:hover { color: var(--text); background: var(--surface); }
  .home-tab.active { color: #3a5548; background: var(--accent); border-bottom-color: var(--accent); }
  @media (max-width: 480px) {
    .home-tab { padding: 10px 4px; font-size: 11px; }
  }

  /* ── 씨앗 피처 카드 */
  .seed-feature {
    background-color: #faf6ee;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 39px,
      rgba(160,130,80,.18) 39px,
      rgba(160,130,80,.18) 40px
    );
    background-position-y: 28px;
    border: 1px solid #c8b090;
    border-left: 3px solid rgba(154,104,64,.45);
    border-radius: var(--radius);
    padding: 32px 24px; text-align: center; margin-top: 4px;
  }
  .seed-feature-label { font-size: 12px; color: #9a6840; font-weight: 700; letter-spacing: .06em; margin-top: 6px; margin-bottom: 12px; }
  .seed-feature-text  { font-size: 17px; font-weight: 400; line-height: 40px; margin-bottom: 24px; font-family: var(--serif); color: #2c1a0e; }

  /* ── 섹션 헤더 */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .06em; }

  /* ── MVP 따봉 */
  .mvp-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 16px; }
  .mvp-author-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; border: 1.5px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: border-color .15s, background .15s; }
  .mvp-author-card.selected { border-color: var(--accent); background: rgba(154,104,64,.12); }
  .mvp-author-card.result { cursor: default; }
  .mvp-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mvp-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }

  /* ── 산문 이야기 */
  .story-prose {
    background-color: #faf6ee;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 28px,
      rgba(160,130,80,.18) 28px,
      rgba(160,130,80,.18) 29px
    );
    border: 1px solid #c8b090;
    border-left: 3px solid rgba(154,104,64,.35);
    border-radius: var(--radius);
    padding: 28px 24px 28px 28px;
  }
  .prose-opening {
    font-family: var(--serif); font-size: 16px; line-height: 29px;
    color: #2c1a0e;
  }
  .prose-line { margin-top: 29px; }
  .prose-sentence { font-family: var(--serif); font-size: 16px; line-height: 29px; display: block; color: #2c1a0e; }
  .prose-author { font-size: 11px; color: #9a7060; display: none; text-align: right; margin-top: 4px; }
  .prose-author.visible { display: block; }
  .prose-branch { font-size: 10px; font-weight: 700; color: #b07040; flex-shrink: 0; }
  .prose-divider {
    display: flex; align-items: center; gap: 12px; margin: 24px 0;
    font-size: 12px; font-weight: 600; color: #8a6a50;
  }
  .prose-divider::before, .prose-divider::after { content:''; flex:1; height:1px; background:#cfc0a0; }
  .prose-author-toggle {

    cursor: pointer; padding: 3px 10px; border-radius: 12px;
    opacity: .8; transition: opacity .15s, border-color .15s;
  }
  .prose-author-toggle:hover { opacity: 1; border-color: var(--accent); color: var(--text); }

  /* ── 탭 */

  /* ── 기타 */

  .section-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .08em; margin-bottom: 10px; }
  .participated-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); display: inline-block; margin-right: 6px; }

  /* ── 투표 고정 버튼 */

  /* ── 알림 bell */

  .bell-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:13px; font-weight:500; padding:4px 8px; border-radius:6px; line-height:1.4; display:inline-flex; align-items:center; gap:2px; }
  .bell-btn:hover { background:var(--surface); }
  .bell-badge { min-width:16px; height:16px; border-radius:8px; background:var(--accent2); color:#fff; font-size:10px; font-weight:700; display:none; align-items:center; justify-content:center; padding:0 4px; pointer-events:none; }
  #notif-wrapper { display:inline-flex; align-items:center; position:relative; }
  .notif-panel { position:fixed; top:62px; right:16px; width:300px; max-width:calc(100vw - 32px); max-height:70vh; overflow-y:auto; background:var(--card); border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.5); z-index:200; }
  .notif-item { padding:12px 14px; border-bottom:1px solid var(--border); font-size:13px; line-height:1.4; cursor:pointer; }
  .notif-item:hover { background:var(--surface); }
  .notif-item.unread { border-left:3px solid var(--accent2); padding-left:11px; }
  .notif-time { font-size:11px; color:var(--muted); margin-top:3px; }
  #notif-wrapper { position:relative; }

  /* ── 분기 뷰 */
  .branch-chooser { background:linear-gradient(135deg,rgba(154,104,64,.06) 0%,rgba(200,130,58,.06) 100%); border:1px solid var(--accent2); border-radius:12px; padding:20px 16px 16px; margin:16px 0; }
  .branch-chooser-label { font-size:12px; color:var(--accent2); text-align:center; letter-spacing:2px; font-weight:700; margin-bottom:14px; }
  .branch-choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .branch-choice-card { background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:16px 14px 12px; cursor:pointer; text-align:left; font-size:15px; line-height:1.75; font-family:var(--serif); color:var(--text); transition:border-color .2s, box-shadow .2s; width:100%; display:flex; flex-direction:column; }
  .branch-choice-card:hover { border-color:var(--accent2); border-width:3px; box-shadow:0 0 20px rgba(200,169,110,.35), inset 0 0 0 1px rgba(200,169,110,.2); }
  .branch-choice-label { display:inline-block; font-size:11px; font-weight:800; letter-spacing:.06em; margin-bottom:8px; padding:2px 9px; border-radius:5px; }
  .branch-prose-row { position:relative; margin:2px 0; }
  .branch-side-indicator { display:flex; flex-direction:column; align-items:stretch; gap:3px; }
  .branch-side-label { display:none; }
  .branch-tab { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; color:var(--muted); white-space:nowrap; text-align:center; }
  .branch-tab.active { border-color:var(--accent2); color:var(--accent2); font-weight:700; }
  /* 산문뷰 박스 밖 왼쪽에 두둥실 */
  #story-prose-wrap.has-branch-tabs { overflow:visible; margin-left:58px; }
  #story-prose-wrap.has-branch-tabs .branch-side-indicator { position:absolute; right:calc(100% + 28px + 10px); top:4px; }

  /* ── 산문 선택 모드 */
  .prose-select-bar { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:12px; display:none; }
  .prose-select-bar.visible { display:block; }

  .story-prose.selecting .prose-line + .prose-line { margin-top:20px; }
  .story-prose.selecting .prose-line:hover { border-left-color:var(--accent2); background:rgba(200,169,110,0.04); }
  .story-prose.selecting .prose-line.prose-selected { border-left-color:var(--accent2); background:rgba(200,130,58,.1); }
  .prose-line-mvp { font-size:11px; color:var(--accent); font-weight:700; margin-left:8px; }
  .prose-line-my-mvp { font-size:10px; color:var(--accent2); margin-left:6px; }
  /* ── 분기 이야기 잠금 산문 */
  .prose-inherited { opacity:0.55; pointer-events:none; }
  .prose-branch-tag { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--accent2); font-weight:700; border:1px solid rgba(128,151,140,.4); border-radius:12px; padding:3px 10px; margin-bottom:10px; }
  /* ── 외부 분기 포크 */
  .ext-branch-fork { border:1px dashed rgba(128,151,140,.4); border-radius:10px; padding:12px; margin:10px 0; }
  .ext-branch-fork-label { font-size:10px; color:var(--muted); text-align:center; letter-spacing:1px; margin-bottom:10px; }
  .ext-branch-choices { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .ext-branch-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; text-align:left; font-size:13px; line-height:1.5; transition:border-color .15s; width:100%; }
  .ext-branch-card:hover { border-color:var(--accent2); }
  .ext-branch-card-label { font-size:10px; color:var(--accent2); font-weight:700; margin-bottom:4px; }

  .admin-btn { padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); transition:opacity .15s; }
  .admin-btn:hover { opacity:.8; }
  .admin-delete { background:#f5dada; color:#b03030; border-color:rgba(176,48,48,.3); }

  /* ── 관리자 */
  .admin-row { display:flex; gap:6px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .admin-btn { padding:3px 9px; border-radius:4px; border:none; font-size:11px; font-weight:700; cursor:pointer; transition:.1s; }
  .admin-adopt  { background:#f0e4c8; color:#8a5a10; }
  .admin-adopt:hover  { background:#e8d8b0; }
  .admin-delete { background:#f5dada; color:#b03030; }
  .admin-delete:hover { background:#f0c8c8; }

  /* ── 온보딩 */
  #onboarding-overlay {
    display:none; position:fixed; inset:0; z-index:9000;
    background:rgba(0,0,0,.72); backdrop-filter:blur(6px);
    align-items:center; justify-content:center; padding:20px;
  }

  }
  .ob-skip:hover { color:var(--text); }
  #ob-content { transition:opacity .2s; height:260px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; overflow:hidden; }
  .ob-img-wrap { text-align:center; height:160px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ob-img-wrap:empty { visibility:hidden; }
  .ob-img-wrap img { max-width:100%; max-height:160px; border-radius:10px; object-fit:cover; display:block; margin:0 auto; }

<body>

<header>
  <div class="logo" onclick="nav('seed')">화씨.방</div>
  <div class="nav-right" id="nav-right"></div>
</header>

<main id="app"><div class="loading">불러오는 중...</div></main>
<div class="toast" id="toast"></div>

<div id="onboarding-overlay">
  <div class="ob-card">
    <button class="ob-skip" onclick="closeOnboarding()">건너뛰기</button>
    <div id="ob-content">
      <div class="ob-img-wrap" id="ob-img-wrap"></div>
      <div class="ob-icon" id="ob-icon"></div>
      <div class="ob-title" id="ob-title"></div>
      <div class="ob-body" id="ob-body"></div>
    </div>

      <span class="ob-dot" id="ob-dot-0"></span>
      <span class="ob-dot" id="ob-dot-1"></span>
      <span class="ob-dot" id="ob-dot-2"></span>
      <span class="ob-dot" id="ob-dot-3"></span>
    </div>
    <div id="ob-actions"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  설정
// ═══════════════════════════════════════════════════════════
// ─── API (Firebase) ───────────────────────────────────────

async function api(action, params = {}) {
  try {
    const _t = new Promise((_, rej) => setTimeout(() => rej(new Error('요청 시간이 초과됐습니다. 재시도해주세요.')), 8000));
    const result = await Promise.race([firebaseApi(action, params), _t]);
    if (!result.ok && result.error === '로그인이 필요합니다.' && localStorage.getItem('hwasee_token')) {
      saveUser(null); renderNav(); nav('seed');
      toast('세션이 만료됐습니다. 다시 로그인해주세요.', true);
    }
    return result;
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

// ─── 캐시 유틸 ────────────────────────────────────────────
const _lsc = {
  get(k) {
    try {
      const r = localStorage.getItem('hc:' + k);
      if (!r) return null;
      const p = JSON.parse(r);
      return Date.now() < p.e ? p.d : null;
    } catch { return null; }
  },
  set(k, d, s) {
    try { localStorage.setItem('hc:' + k, JSON.stringify({ d, e: Date.now() + s * 1000 })); } catch {}
  },
  del(...ks) { ks.forEach(k => { try { localStorage.removeItem('hc:' + k); } catch {} }); },
};

// ─── 탭 정렬 상태 ──────────────────────────────────────────
let _mineSort  = 'activity';
let _mineCache = null; // { active, snapshot }
let _popSort   = 'activity';
let _popCache  = null; // { stories }
let _doneSort  = 'activity';
let _doneCache = null; // { stories }
let _bmIds     = new Set();
async function _loadBmIds() {
  if (!user) { _bmIds = new Set(); return; }
  const res = await api('getBookmarkIds');
  if (res.ok) _bmIds = new Set(res.ids);
}

function _sortStories(stories, key) {
  const arr = [...stories];
  if (key === 'activity') return arr.sort((a, b) => (Number(b.activity_count)||0) - (Number(a.activity_count)||0));
  if (key === 'step')     return arr.sort((a, b) => (Number(b.current_step)||0)   - (Number(a.current_step)||0));
  if (key === 'likes')    return arr.sort((a, b) => (Number(b.like_count)||0)     - (Number(a.like_count)||0));
  return arr.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

function _sortBtns(prefix, keys, current) {
  return `<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    ${keys.map(([k,l]) =>
      `<button id="${prefix}-${k}" class="sort-btn ${current===k?'active':''}" onclick="${prefix==='ms'?'setMineSort':prefix==='ps'?'setPopSort':'setDoneSort'}('${k}')">${l}</button>`
    ).join('')}
  </div>`;
}

function setMineSort(key) {
  _mineSort = key;
  ['activity','step','latest'].forEach(k => {
    const el = document.getElementById('ms-' + k);
    if (el) el.classList.toggle('active', k === key);
  });
  renderMineCards();
}

function renderMineCards() {
  const content = document.getElementById('home-content');
  if (!content || !_mineCache) return;
  const { active } = _mineCache;
  const boosted = active.filter(s => s.is_boosted);
  const regular = _sortStories(active.filter(s => !s.is_boosted), _mineSort);
  const boostHtml = boosted.length ? `
    <div class="boost-section">
      <div class="boost-section-label">✦ 이런 이야기도 있어요</div>
      <div class="boost-scroll">${boosted.map(s => boostCardHtml(s)).join('')}</div>
    </div>` : '';
  content.innerHTML = boostHtml
    + _sortBtns('ms', [['activity','참여도 순'],['step','진행도 순'],['latest','최신 순']], _mineSort)
    + (regular.length
      ? regular.map(s => myStoryCardHtml(s)).join('')
      : `<div class="empty" style="padding-top:30px">참여 중인 이야기가 없어요.<br>씨앗 탭에서 이야기를 시작해 보세요!</div>`);
}

function setPopSort(key) {
  _popSort = key;
  ['activity','step','latest'].forEach(k => {
    const el = document.getElementById('ps-' + k);
    if (el) el.classList.toggle('active', k === key);
  });
  renderPopCards();
}

function renderPopCards() {
  const content = document.getElementById('home-content');
  if (!content || !_popCache) return;
  const boosted = _popCache.stories.filter(s => s.is_boosted);
  const regular = _sortStories(_popCache.stories.filter(s => !s.is_boosted), _popSort);
  const boostHtml = boosted.length ? `
    <div class="boost-section">
      <div class="boost-section-label">✦ 이런 이야기도 있어요</div>
      <div class="boost-scroll">${boosted.map(s => boostCardHtml(s)).join('')}</div>
    </div>` : '';
  content.innerHTML = boostHtml
    + _sortBtns('ps', [['activity','참여도 순'],['step','진행도 순'],['latest','최신 순']], _popSort)
    + (regular.length
      ? regular.map(s => popularCardHtml(s)).join('')
      : `<div class="empty" style="padding-top:40px">아직 이야기가 없어요.<br>씨앗 탭에서 첫 이야기를 시작해 보세요!</div>`);
}

function setDoneSort(key) {
  _doneSort = key;
  ['activity','likes','latest'].forEach(k => {
    const el = document.getElementById('ds-' + k);
    if (el) el.classList.toggle('active', k === key);
  });
  renderDoneCards();
}

function renderDoneCards() {
  const content = document.getElementById('home-content');
  if (!content || !_doneCache) return;
  const sorted = _sortStories(_doneCache.stories, _doneSort);
  content.innerHTML = _sortBtns('ds', [['activity','참여도 순'],['likes','추천 순'],['latest','최신 순']], _doneSort)
    + (sorted.length
      ? sorted.map(s => doneCardHtml(s)).join('')
      : `<div class="empty" style="padding-top:40px">아직 완결된 이야기가 없어요.<br>이야기에 참여해 함께 만들어 가요!</div>`);
}

// ─── 상태 ──────────────────────────────────────────────────

let user = null;

function _applyAdminGaOpt(u) {
  if (u && u.is_admin) window['ga-disable-G-G7M4WPYHQK'] = true;
}
function loadUser() {
  const raw = localStorage.getItem('hwasee_user');
  if (raw) try {
    user = JSON.parse(raw);
    if (user && user.user_id) localStorage.setItem('hwasee_uid', user.user_id);
    _applyAdminGaOpt(user);
  } catch {}
}
function saveUser(u) {
  user = u;
  if (u) {
    localStorage.setItem('hwasee_token', u.token);
    localStorage.setItem('hwasee_user', JSON.stringify(u));
    if (u.user_id) localStorage.setItem('hwasee_uid', u.user_id);
    _applyAdminGaOpt(u);
  } else {
    localStorage.removeItem('hwasee_token');
    localStorage.removeItem('hwasee_user');
    localStorage.removeItem('hwasee_uid');
  }
  renderNav();
}

// ─── 토스트 ───────────────────────────────────────────────

let toastTimer;
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

// ─── 네비게이션 ───────────────────────────────────────────

let currentRoute = 'home';
let currentParam = null;

function nav(route, param) {
  if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; }
  Object.keys(commentCache).forEach(k => delete commentCache[k]);
  if (route === 'story' && currentRoute !== 'story' && currentRoute !== 'episode') {
    window._prevRoute = currentRoute;
  }
  currentRoute = route;
  currentParam = param || null;
  location.hash = param ? `${route}/${param}` : route;
  window.scrollTo(0, 0);
  render();
}

function render() {
  const routes = { home, seed: home, hot: home, mine: home, archive: home, story, episode, auth, profile, create, 'episode-votes': episodeVotes };
  (routes[currentRoute] || home)();
}

function renderNav() {
  const el = document.getElementById('nav-right');
  const trophySvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>`;
  const bellSvg   = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`;
  const rankBtn = `<button class="btn-nav" onclick="openRankingModal()" title="명예의 전당">${trophySvg}</button>`;
  if (user) {
    el.innerHTML = `
      ${rankBtn}
      <div id="notif-wrapper">
        <button class="bell-btn" onclick="toggleNotifPanel()" id="bell-btn" title="알림">${bellSvg}<span class="bell-badge" id="bell-badge"></span></button>
        <div id="notif-panel" style="display:none" class="notif-panel"></div>
      </div>
      ${isAdmin() ? `<button class="btn-nav" onclick="adminPanel()" title="신고 관리">⚠️</button>` : ''}
      <div class="profile-menu-wrap" id="profile-menu-wrap">
        <button class="profile-menu-btn" id="profile-menu-btn" onclick="toggleProfileMenu()">
          <span style="margin-right:3px;font-style:normal">${badgeEmoji(user.badge)}</span>${esc(user.display_name || user.nickname)} <span class="caret">▼</span>
        </button>
        <div class="profile-dropdown" id="profile-dropdown">
          <div class="profile-dropdown-header" style="display:flex;align-items:center;gap:8px">
            <div class="profile-dropdown-nick">${esc(user.display_name || user.nickname)}</div>
            <span class="badge badge-${user.badge}" style="font-size:10px;flex-shrink:0">${badgeEmoji(user.badge)}</span>

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function calcDisplayStep(story, epStep) {
  return story.branch_from_step
    ? (Number(story.branch_from_step) - 1) + Number(epStep)
    : Number(epStep) + 1;
}
function stepRangeLabel(story, minStep, maxStep) {
  const min = calcDisplayStep(story, minStep);
  if (maxStep == null || maxStep === minStep) return `${min}단계`;
  return `${min}~${calcDisplayStep(story, maxStep)}단계`;
}

async function home() {
  const tab = ['seed','popular','mine','done'].includes(currentRoute) ? currentRoute : 'seed';

  const tabHtml = HOME_TABS.map(t => `
    <button class="home-tab ${t.key === tab ? 'active' : ''}"
            onclick="switchHomeTab('${t.key}')"

  document.getElementById('app').innerHTML = `
    <div class="home-tabs">${tabHtml}</div>

async function switchHomeTab(tab) {
  currentRoute = tab;
  location.hash = tab;
  HOME_TABS.forEach(t => {
    const el = document.getElementById('htab-' + t.key);
    if (el) el.classList.toggle('active', t.key === tab);
  });
  const content = document.getElementById('home-content');
  const cacheKey = tab === 'popular' ? 'pop' : tab;
  const hasCached = tab !== 'seed' && !!_lsc.get(cacheKey);
  if (content && !hasCached) content.innerHTML = `<div class="loading">불러오는 중...</div>`;
  await loadHomeTab(tab);
}

async function loadHomeTab(tab) {
  const content = document.getElementById('home-content');
  if (!content) return;

  if (tab === 'seed') {
    content.innerHTML = '';
    let res;
    try { res = await api('getSeeds'); } catch(e) {
      content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('seed')">다시 시도</button></div>`;
      return;
    }
    window._seeds   = res.ok ? res.seeds : [];
    window._seedIdx = 0;
    renderSeedCard();
    // 씨앗 탭 하단 랭킹
    const lbSection = document.createElement('div');
    lbSection.style.cssText = 'margin-top:32px;border-top:1px solid var(--border);padding-top:24px';
    lbSection.innerHTML = `

    content.appendChild(lbSection);
    loadLeaderboard('seed-lb-body');

  } else if (tab === 'popular') {
    const _applyPop = (storiesRes, myRes) => {
      const myIds   = new Set((myRes?.ok ? myRes.stories : []).map(s => s.story_id));
      const stories = (storiesRes?.ok ? storiesRes.stories : []).filter(s => !myIds.has(s.story_id));
      _popCache = { stories };
      if (currentRoute === 'popular') renderPopCards();
    };
    const _cachedPop = _lsc.get('pop');
    if (_cachedPop) _applyPop(_cachedPop.storiesRes, _cachedPop.myRes);
    const _fetchPop = async () => {
      let storiesRes, myRes;
      try {
        const p = [api('getStories', { page: 1 })];
        if (user) p.push(api('getMyStories'));
        [storiesRes, myRes] = await Promise.all(p);
      } catch(e) {
        if (!_cachedPop) content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('popular')">다시 시도</button></div>`;
        return;
      }
      _lsc.set('pop', { storiesRes, myRes }, 150);
      _applyPop(storiesRes, myRes);
    };
    if (!_cachedPop) await _fetchPop(); else _fetchPop();

  } else if (tab === 'mine') {
    if (!user) {
      content.innerHTML = `<div class="empty" style="padding-top:60px">로그인하면 참여 중인 이야기를 볼 수 있어요.<br>
        <button class="btn btn-primary" style="margin-top:20px" onclick="nav('auth','login')">로그인</button></div>`;
      return;
    }
    const _applyMine = (res) => {
      const active = res?.ok ? res.stories.filter(s => s.status === 'active') : [];
      _mineCache = { active };
      if (currentRoute === 'mine') renderMineCards();
    };
    const _cachedMine = _lsc.get('mine');
    if (_cachedMine) _applyMine(_cachedMine);
    const _fetchMine = async () => {
      let res;
      try { res = await api('getMyStories'); } catch(e) {
        if (!_cachedMine) content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('mine')">다시 시도</button></div>`;
        return;
      }
      _lsc.set('mine', res, 120);
      _applyMine(res);
    };
    if (!_cachedMine) await _fetchMine(); else _fetchMine();

  } else if (tab === 'done') {
    const _applyDone = (res) => {
      const stories = res?.ok ? res.stories : [];
      _doneCache = { stories };
      if (currentRoute === 'done') renderDoneCards();
    };
    const _cachedDone = _lsc.get('done');
    if (_cachedDone) _applyDone(_cachedDone);
    const _fetchDone = async () => {
      let res;
      try { res = await api('getStories', { page: 2 }); } catch(e) {
        if (!_cachedDone) content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('done')">다시 시도</button></div>`;
        return;
      }
      _lsc.set('done', res, 660);
      _applyDone(res);
    };
    if (!_cachedDone) await _fetchDone(); else _fetchDone();
  }
}

function _applyStoryData(res, story_id) {
  if (currentParam !== story_id) return;

  const { story: s, episodes, submissions, is_bookmarked, is_liked = false, like_count = 0, my_voted_sub_ids = [] } = res;
  const myVotedSet = new Set(my_voted_sub_ids);

  // 분기 트리 산문 (전역 저장 → chooseBranch 재렌더용)
  const { branches = [], parent_chain = null, mvp_map = {}, my_mvp_episode_id = null } = res;
  window._storyData = { episodes, submissions, story: s, branches, parent_chain, mvp_map, my_mvp_episode_id, my_voted_sub_ids };
  window._branchChoice = {}; // 페이지 진입 시 항상 초기화 → 매번 갈림길 카드 먼저 표시
  window._proseSelMode = null; // 'mvp' | 'branch'
  window._proseSelEpId = null;

  // 열린/대기 에피소드 (현재 갈래 선택 반영)
  const openEp    = getChosenOpenEp(episodes, submissions, window._branchChoice);

  // 분기 이야기면 부모 단계 잠금 산문
  let inheritedHtml = '';
  if (parent_chain && parent_chain.episodes.length) {
    const pTree = getEpisodeTree(parent_chain.episodes, parent_chain.submissions);
    inheritedHtml = pTree ? `<div class="prose-inherited">${renderEpisodeTreeHtml(pTree, {})}</div>` : '';

  // 분기 트리 HTML (closed 에피소드들의 채택 내용만)

    episodes.filter(e => e.status === 'closed'),
    submissions
  );
  const confirmedHtml = `<div id="story-prose-content">${inheritedHtml}${tree ? renderEpisodeTreeHtml(tree, window._branchChoice, mvp_map, branches, my_mvp_episode_id) : ''}</div>`;

  // ── 다음 단계 액션 ──
  let actionHtml = '';
  if (openEp) {

  } else if (s.status === 'completed' || s.status === 'inactive') {
    actionHtml = `

      <div style="margin-left:auto;display:inline-flex;align-items:center;gap:0">
        ${user ? `

            <button class="btn btn-ghost btn-sm" style="border:none;color:var(--muted);display:inline-flex;align-items:center;gap:4px"
              onclick="doBoostStory('${esc(s.story_id)}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><polygon points="12,2 15.1,8.3 22,9.3 17,14.1 18.2,21 12,17.8 5.8,21 7,14.1 2,9.3 8.9,8.3"/></svg>주목</button>` : ''}
          ${isFinished ? `

            <button class="prose-author-toggle" style="border:none;font-size:13px;opacity:1" onclick="enterProseSelMode('mvp','${esc(s.story_id)}')">으뜸 글 뽑기</button>` : ''}
          <span style="width:1px;height:14px;background:var(--border);margin:0 2px;flex-shrink:0"></span>` : ''}
        <button class="prose-author-toggle" style="border:none;font-size:13px;opacity:1;display:inline-flex;align-items:center;gap:4px" onclick="window._proseSelMode==='viewvotes'?cancelProseSelMode():enterProseSelMode('viewvotes','${esc(s.story_id)}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="0" y="5" width="3" height="7" rx="0.5"/><rect x="4.5" y="2" width="3" height="10" rx="0.5"/><rect x="9" y="7" width="3" height="5" rx="0.5"/></svg>공감 현황</button>
        ${isAdmin() && s.status === 'active' ? `
          <span style="width:1px;height:14px;background:var(--border);margin:0 2px;flex-shrink:0"></span>
          <button class="admin-btn admin-delete" onclick="adminCloseStory('${esc(s.story_id)}')">✕ 이야기 종료</button>` : ''}

    </div>
    <div id="prose-select-bar" class="prose-select-bar"></div>
    <div class="story-prose" id="story-prose-wrap">

        </div>
        ${user ? `
          <div class="comment-input-row" style="margin-top:12px">
            <input type="text" id="sc-input" maxlength="300" placeholder="감상을 남겨보세요..."
              onkeydown="if(event.key==='Enter')submitStoryComment('${esc(s.story_id)}')">

}

async function story() {
  const story_id = currentParam;
  selectedSubs = [];
  const cached = _lsc.get('story_' + story_id);
  if (cached) {
    _applyStoryData(cached, story_id);
  } else {
    document.getElementById('app').innerHTML = `<div class="loading">불러오는 중...</div>`;
  }
  const res = await api('getStory', { story_id });
  if (!res.ok) {
    if (!cached) document.getElementById('app').innerHTML = `<div class="empty">이야기를 불러오지 못했습니다.<br><button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="story()">다시 시도</button></div>`;
    return;
  }
  _lsc.set('story_' + story_id, res, 90);
  _applyStoryData(res, story_id);
}

function toggleHistory() {
  const el = document.getElementById('history-body');
  if (!el) return;
  const btn = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    if (btn) btn.textContent = '만들어진 과정 접기 ▴';
  } else {
    el.style.display = 'none';
    if (btn) btn.textContent = '만들어진 과정 보기 ▾';
  }
}

function renderHistoryPanel(episodes, submissions, opening) {
  const closedEps = episodes
    .filter(e => e.status === 'closed')
    .sort((a, b) => Number(a.step) - Number(b.step));
  const openingCard = opening ? `
    <div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:1px">1단계</div>
      <div style="padding:10px 12px;border-radius:8px;border:2px solid var(--success);background:rgba(90,138,114,.1)">
        <div style="font-size:13px;line-height:1.5">${esc(opening)}</div>
        <div style="font-size:11px;color:var(--success);margin-top:6px">✓ 씨앗 문장</div>
      </div>
    </div>` : '';
  if (!closedEps.length) return openingCard || '<div style="color:var(--muted);font-size:13px;padding:12px 0">기록이 없습니다.</div>';
  return openingCard + closedEps.map(ep => {
    const epSubs = submissions
      .filter(s => s.episode_id === ep.episode_id)
      .sort((a, b) => Number(b.vote_count) - Number(a.vote_count));
    return `
      <div style="margin-bottom:20px">
        <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:1px">${Number(ep.step)+1}단계</div>
        ${epSubs.map(sub => {
          const adopted = sub.is_adopted === true || sub.is_adopted === 'TRUE';
          return `
            <div style="padding:10px 12px;margin-bottom:6px;border-radius:8px;border:${adopted?'2px':'1px'} solid ${adopted?'var(--success)':'var(--border)'};background:${adopted?'rgba(90,138,114,.1)':'var(--card)'}">
              <div style="font-size:13px;line-height:1.5">${esc(sub.content)}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:8px">
                <span><span style="font-size:10px;color:var(--muted);margin-right:3px">글쓴이</span>${esc(sub.author_nickname || '익명')}</span>
                <span>공감 ${sub.vote_count}개</span>
                ${adopted ? '<span style="color:var(--success)">✓ 채택</span>' : ''}
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

async function loadStoryComments(story_id) {
  const el = document.getElementById('story-comment-list');
  if (!el) return;
  try {
    const res = await api('getStoryComments', { story_id });
    const comments = res.ok ? res.comments : [];
    el.innerHTML = renderStoryCommentList(comments, story_id);
  } catch(e) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted)">불러올 수 없습니다.</div>';
  }
}

function renderStoryCommentList(comments, story_id) {
  return `
    <div class="comment-list">
      ${comments.length === 0
        ? '<div style="font-size:13px;color:var(--muted);padding:6px 0">첫 번째 감상을 남겨보세요.</div>'
        : comments.map(c => `
            <div class="comment-item">
              <span class="comment-author">${esc(c.author_nickname || '익명')}</span>${esc(c.content)}<span class="comment-time">${timeAgo(c.created_at)}</span>
            </div>`).join('')}
    </div>`;
}

async function submitStoryComment(story_id) {
  const input = document.getElementById('sc-input');
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  const res = await api('addStoryComment', { story_id, content });
  if (!res.ok) { toast(res.error, true); return; }
  input.value = '';
  loadStoryComments(story_id);
}

function renderSubsWithReplies(subs, mySubId, maxVotes, myVotedSet = new Set(), step = 1) {
  const subIds = new Set(subs.map(s => s.sub_id));
  const roots  = subs.filter(s => !s.derived_from || !subIds.has(s.derived_from));
  const childMap = {};
  subs.forEach(s => {
    if (s.derived_from && subIds.has(s.derived_from)) {
      if (!childMap[s.derived_from]) childMap[s.derived_from] = [];
      childMap[s.derived_from].push(s);
    }
  });
  return roots.map(root => {
    const children = childMap[root.sub_id] || [];
    return renderVoteCard(root, mySubId, maxVotes, myVotedSet, step, false) +
      children.map(child => `
        <div style="display:flex;gap:8px;margin-top:6px;margin-bottom:10px;padding-left:12px">
          <div style="display:flex;flex-direction:column;align-items:center;padding-top:8px;flex-shrink:0">
            <span style="font-size:13px;color:var(--muted);line-height:1">↳</span>
          </div>
          <div style="flex:1">${renderVoteCard(child, mySubId, maxVotes, myVotedSet, step, true)}</div>
        </div>`).join('');
  }).join('');
}

function renderVoteCard(sub, mySubId, maxVotes, myVotedSet = new Set(), step = 1, isChild = false) {
  const isAdopted   = sub.is_adopted === true || sub.is_adopted === 'TRUE';
  const iVoted      = myVotedSet.has(sub.sub_id);
  const voteCount   = Number(sub.vote_count) || 0;
  const barPct      = Math.min(Math.round(voteCount / FB_VOTE_THRESHOLD * 100), 100);
  const isClickable = user && sub.sub_id !== mySubId && !isAdopted;
  const showLabel   = Number(step) >= 2;
  const isMyCard    = sub.sub_id === mySubId;
  const bStyle      = 'border-top:none;font-size:9px;font-weight:700;padding:2px 7px;letter-spacing:.04em;pointer-events:none';
  const cornerBadge = isMyCard && isChild
    ? `<div style="position:absolute;top:-4px;right:12px;display:flex">
        <div style="${bStyle};background:#a07850;color:#fff;border:1px solid rgba(120,80,40,.25);border-right:none;border-radius:0 0 0 5px">내 글</div>
        <div style="${bStyle};background:#c8b898;color:#5a4030;border:1px solid rgba(154,104,64,.25);border-radius:0 0 5px 0">손본 글</div>
       </div>`
    : isMyCard
      ? `<div style="position:absolute;top:-4px;right:12px;${bStyle};background:#a07850;color:#fff;border:1px solid rgba(120,80,40,.25);border-radius:0 0 5px 5px">내 글</div>`
      : isChild
        ? `<div style="position:absolute;top:-4px;right:12px;${bStyle};background:#c8b898;color:#5a4030;border:1px solid rgba(154,104,64,.25);border-radius:0 0 5px 5px">손본 글</div>`
        : '';

  return `
    <div class="vote-card ${isAdopted?'adopted':''} ${isClickable?'clickable':''}" id="sc-${sub.sub_id}"
      style="position:relative;${iVoted?'border-color:var(--accent);':''}"
      ${isClickable ? `onclick="toggleSub('${sub.sub_id}')"` : isMyCard && !isAdopted ? `onclick="toast('내가 쓴 글은 선택할 수 없어요.',true)"` : ''}>
      ${cornerBadge}
      ${showLabel ? (sub.is_closing ? `<div style="font-size:10px;font-weight:700;color:var(--accent2);margin-bottom:6px;letter-spacing:.04em">■ 닫는 이야기</div>` : `<div style="font-size:10px;font-weight:700;color:#5a8a72;margin-bottom:6px;letter-spacing:.04em">▶ 열린 이야기</div>`) : ''}
      <div class="vote-content">${esc(sub.content)}</div>
      <div class="vote-meta">
        <span class="vote-count">공감 ${voteCount}/${FB_VOTE_THRESHOLD}개</span>
        ${isAdopted ? '<span style="color:var(--success)">✓ 채택됨</span>' : ''}
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${sub.author_badge ? `<span class="badge badge-${sub.author_badge}" style="font-size:9px;padding:1px 5px;margin-right:2px">${badgeEmoji(sub.author_badge)}</span>` : ''}${esc(sub.author_nickname || '익명')}</span>
      </div>
      <div class="vote-bar"><div class="vote-fill" style="width:${barPct}%"></div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-ghost btn-sm" style="font-size:12px;padding:3px 10px"
          onclick="event.stopPropagation();toggleComments('${sub.sub_id}')">
          댓글${sub.comment_count > 0 ? ` <span style="color:var(--accent);font-weight:700">+${sub.comment_count}</span>` : ''}
        </button>
        ${user && !mySubId && !isAdopted && !sub.derived_from ? `
          <button class="btn btn-ghost btn-sm" style="font-size:12px;padding:3px 10px;color:var(--accent2)"
            onclick="event.stopPropagation();polishSub('${sub.sub_id}','${esc(sub.content).replace(/'/g,"\\'")}','${esc(sub.author_nickname||'익명')}')">
            ✏ 다듬어서 제안하기
          </button>` : ''}
        ${user && sub.sub_id !== mySubId ? `
          <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px;color:var(--muted);margin-left:auto;opacity:0.7"
            onclick="event.stopPropagation();toggleReport('${sub.sub_id}')">⚑ 신고</button>` : ''}
        ${sub.sub_id === mySubId && voteCount === 0 && !isAdopted ? `
          <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px;color:var(--muted);margin-left:auto;opacity:0.6"
            onclick="event.stopPropagation();deleteMySubmission('${sub.sub_id}')">✕ 삭제</button>` : ''}
      </div>
      ${user && sub.sub_id !== mySubId ? `
        <div id="report-${sub.sub_id}" style="display:none;margin-top:6px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">신고 사유를 선택해주세요</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${[['plagiarism','표절'],['sexual','성적 묘사'],['profanity','욕설·혐오'],['spam','스팸'],['other','기타']].map(([v,l])=>`
              <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px"
                onclick="event.stopPropagation();submitReport('${sub.sub_id}','${v}')">${l}</button>`).join('')}
          </div>
        </div>` : ''}
      ${isAdmin() ? `
        <div class="admin-row">
          ${!isAdopted ? `<button class="admin-btn admin-adopt" onclick="event.stopPropagation();adminForceAdopt('${sub.sub_id}')">✓ 채택 강행</button>` : ''}
          <button class="admin-btn admin-delete" onclick="event.stopPropagation();adminDeleteSub('${sub.sub_id}')">✕ 삭제</button>
        </div>` : ''}
      <div id="comments-${sub.sub_id}" style="display:none"></div>
    </div>`;
}

// ─── 랭킹 ─────────────────────────────────────────────────
let _lbData = null;

async function loadLeaderboard(targetId) {
  if (!_lbData) _lbData = _lsc.get('lb');
  if (_lbData && targetId) renderLbInto(targetId);
  const _refresh = async () => {
    try {
      const res = await api('getLeaderboard', {});
      if (!res.ok) { if (targetId) renderLbInto(targetId); return; }
      _lbData = res;
      _lsc.set('lb', res, 360);
      if (targetId) renderLbInto(targetId);
      const modal = document.getElementById('modal-lb-body');
      if (modal) modal.innerHTML = lbBodyHtml(10);
    } catch(e) { if (targetId) renderLbInto(targetId); }
  };
  if (!_lbData) await _refresh(); else _refresh();
}

function renderLbInto(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = _lbData
    ? lbBodyHtml()
    : '<div style="font-size:12px;color:var(--muted)">랭킹을 불러올 수 없습니다.</div>';
}

function lbBodyHtml(limit) {
  if (!_lbData) return '<div style="font-size:12px;color:var(--muted)">아직 기록이 없어요.</div>';
  const n = limit || 10;
  const emptyHtml = '<div style="font-size:12px;color:var(--muted);padding:12px 0;text-align:center">아직 기록이 없어요.</div>';

  const pointRows = (_lbData.points || []).slice(0, n);
  const pointHtml = pointRows.length
    ? pointRows.map((r, i) => `
        <div class="lb-row">
          <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
          <span class="badge badge-${r.badge||'seed'}" style="font-size:9px;padding:1px 4px;flex-shrink:0">${badgeEmoji(r.badge||'seed')}</span>
          <span class="lb-name">${esc(r.nickname)}</span>
          <span class="lb-value">${r.value||0}p</span>
        </div>`).join('')
    : emptyHtml;

  const adoptRows = (_lbData.adoptions || []).slice(0, n);
  const adoptHtml = adoptRows.length
    ? adoptRows.map((r, i) => `
        <div class="lb-row">
          <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
          <span class="badge badge-${r.badge||'seed'}" style="font-size:9px;padding:1px 4px;flex-shrink:0">${badgeEmoji(r.badge||'seed')}</span>
          <span class="lb-name">${esc(r.nickname)}</span>
          <span class="lb-value">${r.value||0}편</span>
        </div>`).join('')
    : emptyHtml;

  return `<div style="display:flex">
    <div style="flex:1;padding:0 14px;border-right:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;text-align:center">포인트 랭킹</div>
      ${pointHtml}
    </div>
    <div style="flex:1;padding:0 14px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;text-align:center">채택 랭킹</div>
      ${adoptHtml}
    </div>
  </div>`;
}

      <div id="modal-lb-body"><div style="font-size:12px;color:var(--muted)">불러오는 중...</div></div>
    </div>`;
  document.body.appendChild(modal);
  // 모달에서는 10위까지 보여줌
  loadLeaderboard().then(() => {
    const el = document.getElementById('modal-lb-body');
    if (el && _lbData) el.innerHTML = lbBodyHtml(10);
  });
}

function toggleReport(sub_id) {
  const el = document.getElementById('report-' + sub_id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function submitReport(sub_id, reason) {
  if (!confirm('이 문장을 신고하시겠습니까?')) return;
  const res = await api('addReport', { sub_id, reason });
  const el = document.getElementById('report-' + sub_id);
  if (el) el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:2px 0">신고가 접수됐습니다.</div>';
  if (!res.ok) toast(res.error, true);
}

async function toggleComments(sub_id) {
  const el = document.getElementById('comments-' + sub_id);
  if (!el) return;
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }

  // 캐시 없으면 fetch
  if (!commentCache[sub_id]) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:8px 0">불러오는 중...</div>';
    el.style.display = 'block';
    try {
      const res = await api('getComments', { sub_id });
      commentCache[sub_id] = res.ok ? res.comments : [];
    } catch(e) {
      commentCache[sub_id] = [];
    }
  }
  el.innerHTML = renderCommentsInner(sub_id, commentCache[sub_id] || []);
  el.style.display = 'block';
}

function renderCommentsInner(sub_id, comments) {
  return `
    <div class="comment-list">
      ${comments.length === 0
        ? '<div style="font-size:13px;color:var(--muted);padding:6px 0">첫 댓글을 남겨보세요.</div>'
        : comments.map(c => c.deleted ? `
            <div class="comment-item">
              <span class="comment-body" style="color:var(--muted);font-style:italic">삭제된 댓글입니다.</span>
            </div>` : `
            <div class="comment-item">
              <span class="comment-body"><span class="comment-author">${esc(c.author_nickname || '익명')}</span>${esc(c.content)}<span class="comment-time">${timeAgo(c.created_at)}</span></span>
              ${user && (c.author_id === user.user_id) ? `<button class="comment-del-btn" onclick="event.stopPropagation();deleteComment('${c.comment_id}','${sub_id}')">✕</button>` : ''}
            </div>`).join('')}
      ${user ? `
        <div class="comment-input-row">
          <input type="text" id="ci-${sub_id}" maxlength="100" placeholder="댓글 달기..."
            onclick="event.stopPropagation()"
            onkeydown="if(event.key==='Enter'){event.stopPropagation();addComment('${sub_id}')}">
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();addComment('${sub_id}')">등록</button>
        </div>` : ''}
    </div>`;
}

function toggleSub(sub_id) {
  const idx = selectedSubs.indexOf(sub_id);
  if (idx >= 0) {
    selectedSubs.splice(idx, 1);
    document.getElementById('sc-' + sub_id).classList.remove('selected');
  } else {
    if (selectedSubs.length >= 2) {
      const oldest = selectedSubs.shift();
      const oldEl = document.getElementById('sc-' + oldest);
      if (oldEl) oldEl.classList.remove('selected');
    }
    selectedSubs.push(sub_id);
    document.getElementById('sc-' + sub_id).classList.add('selected');
  }
  const btn = document.getElementById('vote-btn');
  if (btn) btn.textContent = selectedSubs.length === 0
    ? '2개 선택 가능'
    : selectedSubs.length >= 2
      ? '공감하기'
      : '공감하기 · 1개 더 고를 수 있어요';
}

async function submitSubInStory(episode_id, closing = false) {
  const content = document.getElementById('sub-input').value.trim();
  if (!content) { toast('문장을 입력해주세요.', true); return; }
  if (content.length > 50) { toast('조금 더 짧게 써주세요.', true); return; }
  const derived_from = window._polishFrom || '';
  const res = await api('createSubmission', { episode_id, content, derived_from, closing });
  if (!res.ok) { toast(res.error, true); return; }
  window._polishFrom = null;
  _lsc.del('pop', 'done', 'mine', 'story_' + currentParam);
  toast(closing ? '제출 완료! 이야기 마무리 공감이 시작됩니다.' : '제출 완료!');
  story();
}

function polishSub(sub_id, content, author_nickname) {
  window._polishFrom = sub_id;
  const input = document.getElementById('sub-input');
  if (!input) { toast('먼저 이어 쓰기 칸을 찾을 수 없습니다.', true); return; }
  input.value = content;
  updateCount('sub-input', 'sub-cc');
  const ind = document.getElementById('polish-indicator');
  if (ind) { ind.style.display = 'block'; ind.textContent = `✏ "${author_nickname}"의 글을 손보는 중`; }
  input.focus(); input.select();
  input.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function toggleBookmark(story_id, btn) {
  if (!user) { toast('로그인이 필요합니다.', true); return; }
  const isMarked = btn.getAttribute('data-bm') === '1';
  const res = await api(isMarked ? 'removeBookmark' : 'addBookmark', { story_id });
  if (!res.ok && !res.already) { toast(res.error, true); return; }
  if (isMarked) _bmIds.delete(story_id); else _bmIds.add(story_id);
  const nowMarked = !isMarked;
  btn.setAttribute('data-bm', nowMarked ? '1' : '');
  btn.style.color = nowMarked ? 'var(--accent2)' : 'var(--muted)';
  btn.innerHTML = `<svg width="9" height="12" viewBox="0 0 9 12" fill="${nowMarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M1 1h7v10l-3.5-2.5L1 11z"/></svg>${nowMarked ? '책갈피됨' : '책갈피'}`;
  toast(isMarked ? '책갈피 해제됐습니다.' : '책갈피에 추가됐습니다.');
}

async function submitVoteInStory(episode_id) {
  if (!selectedSubs.length) { toast('문장을 선택해주세요.', true); return; }
  const wasRevote = window._storyData?.my_voted_sub_ids?.length > 0;
  if (wasRevote) {
    const prev = window._storyData.my_voted_sub_ids;
    const unchanged = selectedSubs.length === prev.length && selectedSubs.every(id => prev.includes(id));
    if (unchanged) { toast('선택이 이전과 같아요. 다른 문장을 골라 변경할 수 있어요.', false); return; }
  }
  const btn = document.getElementById('vote-btn');
  if (btn) { btn.disabled = true; btn.textContent = '공감 중...'; }
  const res = await api('vote', { episode_id, sub_ids: selectedSubs });
  if (!res.ok) { toast(res.error, true); if (btn) btn.disabled = false; return; }
  _lsc.del('pop', 'done', 'mine', 'story_' + currentParam);
  toast(wasRevote ? '공감이 변경됐어요!' : `공감 완료! 현재 ${res.total_voters}명 참여`);
  story();
}

async function deleteComment(comment_id, sub_id) {
  if (!confirm('댓글을 삭제할까요?')) return;
  const res = await api('deleteComment', { comment_id });
  if (!res.ok) { toast(res.error, true); return; }
  delete commentCache[sub_id];
  const el = document.getElementById('comments-' + sub_id);
  if (el && el.style.display !== 'none') {
    const r2 = await api('getComments', { sub_id });
    commentCache[sub_id] = r2.ok ? r2.comments : [];
    el.innerHTML = renderCommentsInner(sub_id, commentCache[sub_id]);
  }
}

async function addComment(sub_id) {
  if (!user) { toast('로그인이 필요합니다.', true); return; }
  const input = document.getElementById('ci-' + sub_id);
  if (!input) return;
  const content = input.value.trim();
  if (!content) { toast('댓글 내용을 입력해주세요.', true); return; }
  const res = await api('addComment', { sub_id, content });
  if (!res.ok) { toast(res.error, true); return; }
  input.value = '';
  toast('댓글 등록!');
  // 캐시 무효화 후 댓글 섹션만 새로고침
  delete commentCache[sub_id];
  const el = document.getElementById('comments-' + sub_id);
  if (el && el.style.display !== 'none') {
    try {
      const r2 = await api('getComments', { sub_id });
      commentCache[sub_id] = r2.ok ? r2.comments : [];
      el.innerHTML = renderCommentsInner(sub_id, commentCache[sub_id]);
    } catch(e) {}
  }
}

// ─── 에피소드 단독 뷰 (직접 URL 접근용) ──────────────────

async function episode() {
  if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; }
  const episode_id = currentParam;
  selectedSubs = [];
  document.getElementById('app').innerHTML = `<div class="loading">불러오는 중...</div>`;

  let res;
  try {
    res = await api('getEpisode', { episode_id });
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="episode()">다시 시도</button></div>`;
    return;
  }
  if (!res.ok) { document.getElementById('app').innerHTML = `<div class="empty">에피소드를 불러오지 못했습니다.<br><button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="episode()">다시 시도</button></div>`; return; }

  const ep           = res.episode;
  const prevChain    = res.prevChain || [];
  const storyOpening = res.story ? res.story.opening : '';
  const subs         = ep.submissions || [];
  const isClosed     = ep.status !== 'open';
  const mySubId      = user ? (subs.find(s => s.author_id === user.user_id) || {}).sub_id : null;
  const maxVotes     = subs.length ? Math.max(...subs.map(s => Number(s.vote_count)||0)) : 0;

  // 이전 이야기 흐름
  const chainLines = [];
  if (storyOpening) chainLines.push(`<div style="display:flex;gap:10px;align-items:baseline;margin-bottom:8px"><span style="font-size:11px;color:var(--accent);font-weight:700;white-space:nowrap;min-width:36px">1단계</span><span style="font-size:14px;line-height:1.6">"${esc(storyOpening)}"</span></div>`);
  prevChain.forEach(p => chainLines.push(`<div style="display:flex;gap:10px;align-items:baseline;margin-bottom:8px"><span style="font-size:11px;color:var(--muted);white-space:nowrap;min-width:36px">${p.step+1}단계</span><span style="font-size:14px;line-height:1.6">"${esc(p.content)}"</span></div>`));

  document.getElementById('app').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="nav('story','${esc(ep.story_id)}')" style="margin-bottom:20px">← 스토리로</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <h2 style="margin:0">${Number(ep.step)+1}단계 이어쓰기</h2>
      <span class="story-status ${isClosed?'status-completed':'status-active'}">${isClosed?'마감':'공감 중'}</span>
      <span style="font-size:13px;color:var(--muted);margin-left:auto">참여자 ${ep.vote_total}명</span>
    </div>

    ${chainLines.length ? `
    <div class="card" style="margin-bottom:20px;border-color:#2a2a50">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:12px">지금까지의 이야기</div>
      ${chainLines.join('')}
      <div style="display:flex;gap:10px;align-items:baseline;margin-top:4px;padding-top:10px;border-top:1px solid var(--border)">
        <span style="font-size:11px;color:var(--accent);font-weight:700;white-space:nowrap;min-width:36px">${Number(ep.step)+1}단계</span>
        <span style="font-size:13px;color:var(--muted)">← 지금 이어쓰는 단계</span>
      </div>
    </div>` : ''}

    ${isClosed ? '' : user ? `
    <div class="card" style="margin-bottom:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">📝 내 문장 제출</div>
      ${mySubId ? `<div style="color:var(--muted);font-size:14px">이미 제출하셨습니다.</div>` : `
        <input type="text" id="sub-input" maxlength="50" placeholder="한 문장으로 이어가세요" oninput="updateCount('sub-input','sub-cc')" style="margin-bottom:6px">
        <div class="char-count" id="sub-cc" style="margin-bottom:10px">0자</div>
        <button class="btn btn-primary btn-sm" onclick="submitSub('${esc(episode_id)}')">제출</button>`}
    </div>` : `
    <div class="card" style="margin-bottom:24px;text-align:center">
      <span style="color:var(--muted)">참여하려면 </span>
      <button class="btn btn-ghost btn-sm" onclick="nav('auth','login')">로그인</button>이 필요합니다.
    </div>`}

    <div style="font-size:14px;font-weight:700;margin-bottom:12px">
      제출된 문장 ${subs.length}개
      ${!isClosed && user && mySubId ? `<span style="font-size:12px;color:var(--muted);margin-left:8px">최대 2개 선택 후 공감</span>` : ''}
    </div>
    <div id="sub-list">
      ${subs.length === 0 ? `<div class="empty" style="padding:32px 0">아직 제출된 문장이 없습니다.</div>` :
        subs.map(s => renderSubCard(s, isClosed, mySubId, maxVotes, ep.step)).join('')}
    </div>
    ${!isClosed && user && mySubId ? `
    <div style="margin-top:16px;text-align:center">
      <button class="btn btn-primary" id="vote-btn" onclick="submitVote('${esc(episode_id)}')">선택한 문장에 공감</button>
    </div>` : ''}`;

  // 에피소드가 열려 있을 때만 실시간 리스너 부착
  if (!isClosed) {
    if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; }
    _epUnsubscribe = firebase.firestore()
      .collection('submissions')
      .where('episode_id', '==', episode_id)
      .onSnapshot(snap => {
        const list = document.getElementById('sub-list');
        if (!list) { if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; } return; }
        const freshSubs = snap.docs.map(d => ({ sub_id: d.id, ...d.data() }));
        const freshMax  = freshSubs.length ? Math.max(...freshSubs.map(s => Number(s.vote_count)||0)) : 0;
        list.innerHTML = freshSubs.length === 0
          ? `<div class="empty" style="padding:32px 0">아직 제출된 문장이 없습니다.</div>`
          : freshSubs.map(s => renderSubCard(s, false, mySubId, freshMax, ep.step)).join('');
        // 투표 버튼 카운트 동기화
        const hdr = list.previousElementSibling;
        if (hdr) hdr.querySelector?.('.sub-count-label') && (hdr.querySelector('.sub-count-label').textContent = `제출된 문장 ${freshSubs.length}개`);
      }, () => { if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; } });
  }
}

function renderSubCard(s, isClosed, mySubId, maxVotes, step = 1) {
  const isAdopted  = s.is_adopted === true || s.is_adopted === 'TRUE';
  const sVoteCount = Number(s.vote_count) || 0;
  const barPct     = Math.min(Math.round(sVoteCount / FB_VOTE_THRESHOLD * 100), 100);
  const isClickable = !isClosed && s.sub_id !== mySubId;
  const showLabel   = Number(step) >= 2;
  return `
    <div class="vote-card ${isAdopted?'adopted':''}" id="sc-${s.sub_id}"
      ${isClickable ? `onclick="toggleSub('${s.sub_id}')"` : ''} style="${isClickable?'cursor:pointer':''}">
      ${isAdopted ? `<div style="font-size:11px;color:var(--success);margin-bottom:4px">✓ 채택됨</div>` : ''}
      ${showLabel ? (s.is_closing ? `<div style="font-size:10px;font-weight:700;color:var(--accent2);margin-bottom:6px;letter-spacing:.04em">■ 닫는 이야기</div>` : `<div style="font-size:10px;font-weight:700;color:#5a8a72;margin-bottom:6px;letter-spacing:.04em">▶ 열린 이야기</div>`) : ''}
      <div class="vote-content">${esc(s.content)}</div>
      <div class="vote-meta">
        <span class="vote-count">공감 ${sVoteCount}/${FB_VOTE_THRESHOLD}개</span>
        ${s.sub_id === mySubId ? '<span class="tag">내 제출</span>' : ''}
        <span style="margin-left:auto;font-size:11px;color:var(--muted)"><span style="font-size:10px;margin-right:3px">글쓴이</span>${esc(s.author_id.slice(0,6))}...</span>
      </div>
      <div class="vote-bar"><div class="vote-fill" style="width:${barPct}%"></div></div>
    </div>`;
}

async function submitSub(episode_id) {
  const content = document.getElementById('sub-input').value.trim();

  const res = await api('createSubmission', { episode_id, content, derived_from: '' });

async function submitVote(episode_id) {

async function episodeVotes() {
  const episode_id = currentParam;
  if (!episode_id) { nav('seed'); return; }
  document.getElementById('app').innerHTML = `<div class="empty">불러오는 중...</div>`;

  const epSnap = await firebase.firestore().collection('episodes').doc(episode_id).get();
  if (!epSnap.exists) { toast('에피소드를 찾을 수 없습니다.', true); nav('seed'); return; }
  const ep = epSnap.data();
  const story_id = ep.story_id;

  const [subsSnap, stSnap] = await Promise.all([
    firebase.firestore().collection('submissions').where('episode_id', '==', episode_id).get(),
    firebase.firestore().collection('stories').doc(story_id).get(),
  ]);

  const story = stSnap.data() || {};
  const subs = subsSnap.docs.map(d => ({ sub_id: d.id, ...d.data() }))
    .sort((a, b) => (b.vote_count || 0) - (a.vote_count || 0));

  const authorIds = [...new Set(subs.map(s => s.author_id).filter(Boolean))];
  const nickMap = {};
  await Promise.all(authorIds.map(async id => {
    const uSnap = await firebase.firestore().collection('users').doc(id).get();
    if (uSnap.exists) { const d = uSnap.data(); nickMap[id] = d.display_name || d.nickname || '익명'; }
  }));

  const stepNum = Number(ep.step) + 1;
  const totalVoters = ep.vote_total || 0;
  const canBranch = user && (story.status === 'completed' || story.status === 'inactive');

  const subsHtml = subs.length === 0
    ? `<div class="empty" style="padding:32px 0">제출된 문장이 없습니다.</div>`
    : subs.map(sub => {
        const isAdopted = sub.is_adopted === true || sub.is_adopted === 'TRUE';
        const nickname = nickMap[sub.author_id] || sub.author_nickname || '익명';
        return `<div class="card" style="margin-bottom:10px;${isAdopted ? 'border-color:var(--accent2)' : ''}">
          ${isAdopted ? `<div style="font-size:10px;font-weight:700;color:var(--accent2);margin-bottom:6px;letter-spacing:.04em">✓ 채택됨</div>` : ''}
          <div style="font-size:14px;line-height:1.6;margin-bottom:10px">${esc(sub.content)}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted)">
            <span><span style="font-size:10px;color:var(--muted);margin-right:3px">글쓴이</span>${esc(nickname)}</span>
            <span style="${isAdopted ? 'color:var(--accent2);font-weight:700' : ''}">▲ ${sub.vote_count || 0}개 공감</span>
          </div>
        </div>`;
      }).join('');

  document.getElementById('app').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="nav('story','${esc(story_id)}')" style="margin-bottom:20px">← 스토리로</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
      <h2 style="margin:0">${stepNum}단계 공감 현황</h2>
    </div>

async function startBranchFromHere(story_id, step) {
  const branchStep = Number(step) + 1;
  if (!confirm(`${branchStep}단계에서 새로운 이야기를 시작할까요?\n채택된 문구는 경쟁에서 빠져요!\n30P가 차감됩니다.`)) return;
  const res = await api('createBranch', { story_id, branch_from_step: branchStep });
  if (!res.ok) { toast(res.error, true); return; }
  toast('새로운 이야기가 시작됐어요!');
  nav('story', res.new_story_id);
}

function selectReferral(btn, value) {
  const input = document.getElementById('a-referral');
  if (input.value === value) {
    input.value = '';
    btn.classList.remove('active');
  } else {
    input.value = value;
    document.querySelectorAll('#referral-chips .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
}

async function doLogin() {
  const nickname = document.getElementById('a-nick').value.trim();
  const password = document.getElementById('a-pw').value;
  const res = await api('login', { nickname, password });
  if (!res.ok) { toast(res.error, true); return; }
  saveUser(res);
  const dn = res.display_name || res.nickname;
  toast(`반갑습니다, ${dn}님!`);
  if (res.daily_bonus) setTimeout(() => toast(`🌿 출석 점수 +${res.daily_bonus}p 지급됐어요!`), 600);
  nav('seed');
  if (!localStorage.getItem('hwasee_onboarding_seen')) setTimeout(showOnboarding, 400);
}

let _dnCheckTimer;
async function checkDnAvail() {
  const el = document.getElementById('a-display');
  const status = document.getElementById('dn-status');
  if (!el || !status) return;
  const val = el.value.trim();
  status.textContent = '';
  clearTimeout(_dnCheckTimer);
  if (!val || val.length < 2) return;
  _dnCheckTimer = setTimeout(async () => {
    const res = await api('checkDisplayName', { display_name: val });
    if (!res.ok) return;
    status.textContent = res.available ? '✓ 사용가능' : '✗ 중복';
    status.style.color = res.available ? 'var(--success)' : 'var(--accent2)';
  }, 500);
}

async function doRegister() {
  const nickname    = document.getElementById('a-nick').value.trim();
  const displayName = (document.getElementById('a-display')?.value || '').trim();
  const nameVal     = (document.getElementById('a-name')?.value || '').trim();
  const password    = document.getElementById('a-pw').value;
  const password2   = document.getElementById('a-pw2').value;
  if (!/^[가-힣a-zA-Z0-9]{2,12}$/.test(nickname)) {
    toast('아이디는 2~12자, 한글·영문·숫자만 사용할 수 있어요.', true); return;
  }
  if (!displayName) {
    toast('닉네임을 입력해주세요.', true); return;
  }
  if (!nameVal) {
    toast('이름을 입력해주세요. (비밀번호 찾기에 사용됩니다)', true); return;
  }
  if (password.length < 8) {
    toast('비밀번호는 8자 이상이어야 해요.', true); return;
  }
  if (password !== password2) {
    toast('비밀번호가 일치하지 않아요.', true); return;
  }
  const referral = (document.getElementById('a-referral')?.value || '').trim();
  const res = await api('register', { nickname, password, name: nameVal, display_name: displayName });
  if (!res.ok) { toast(res.error, true); return; }
  saveUser(res);
  if (typeof gtag === 'function') gtag('event', 'sign_up', { method: 'email', referral_source: referral || '미입력' });
  toast(`가입 완료! 환영합니다, ${res.display_name || res.nickname}님!`);
  nav('seed');
  if (!localStorage.getItem('hwasee_onboarding_seen')) setTimeout(showOnboarding, 400);
}

async function doRecover() {
  const nickname    = document.getElementById('a-nick').value.trim();
  const nameVal     = (document.getElementById('a-name')?.value || '').trim();
  const new_password  = document.getElementById('a-pw').value;
  const new_password2 = document.getElementById('a-pw2').value;
  if (!nickname || !nameVal) { toast('닉네임과 이름을 모두 입력해주세요.', true); return; }
  if (new_password.length < 8) { toast('새 비밀번호는 8자 이상이어야 해요.', true); return; }
  if (new_password !== new_password2) { toast('비밀번호가 일치하지 않아요.', true); return; }
  const res = await api('resetPassword', { nickname, name: nameVal, new_password });
  if (!res.ok) { toast(res.error, true); return; }
  toast('비밀번호가 재설정됐어요. 로그인해주세요.');
  nav('auth', 'login');
}

let _notifOpen = false;
let _notifCache = null;

async function loadNotifCount() {
  try {
    const res = await api('getNotifications', {});
    const count = res.ok ? res.unread_count : 0;
    const badge = document.getElementById('bell-badge');
    if (badge) {
      badge.textContent = count > 9 ? '9+' : count;
      badge.style.display = count > 0 ? 'inline-flex' : 'none';

function _renderNotifPanel(panel, notifs) {
  if (notifs.length === 0) {
    panel.innerHTML = '<div style="padding:14px;font-size:13px;color:var(--muted);text-align:center">새 알림이 없습니다.</div>';
  } else {
    panel.innerHTML = `
      <div style="padding:10px 14px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border)">알림</div>
      ${notifs.map(n => `
        <div class="notif-item ${n.is_read === 'false' || n.is_read === false ? 'unread' : ''}"
          onclick="notifClick('${esc(n.story_id)}')">
          <div>${esc(n.message)}</div>
          <div class="notif-time">${timeAgo(n.created_at)}</div>
        </div>`).join('')}`;
  }
}

async function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  _notifOpen = !_notifOpen;
  if (!_notifOpen) { panel.style.display = 'none'; return; }

  panel.style.display = 'block';
  if (_notifCache) {
    _renderNotifPanel(panel, _notifCache);
  } else {
    panel.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--muted)">불러오는 중...</div>';
  }

  try {
    const res = await api('getNotifications', {});
    const notifs = res.ok ? res.notifications : [];
    _notifCache = notifs;
    _renderNotifPanel(panel, notifs);
    if (notifs.length > 0) {
      api('markNotificationsRead', {}).then(() => {
        const badge = document.getElementById('bell-badge');
        if (badge) badge.style.display = 'none';
        _notifCache = notifs.map(n => ({ ...n, is_read: true }));
      });
    }
  } catch(e) {
    if (!_notifCache) panel.innerHTML = '<div style="padding:14px;font-size:13px;color:var(--muted)">불러오기 실패.</div>';
  }
}
