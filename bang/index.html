// 현재 갈래 선택에 맞는 open 에피소드 찾기
function getChosenOpenEp(allEps, submissions, choices) {
  const openEps = allEps.filter(e => e.status === 'open');
  if (!openEps.length) return null;
  if (openEps.length === 1) return openEps[0];

  const subToOpenEp = {};
  openEps.forEach(ep => { if (ep.parent_sub_id) subToOpenEp[ep.parent_sub_id] = ep; });
  const subToClosedEps = {};
  allEps.filter(e => e.status === 'closed').forEach(ep => {
    if (!ep.parent_sub_id) return;
    (subToClosedEps[ep.parent_sub_id] = subToClosedEps[ep.parent_sub_id] || []).push(ep);
  });

  let cur = allEps.find(ep => !ep.parent_sub_id || ep.parent_sub_id === '');
  while (cur) {
    if (cur.status === 'open') return cur;
    const adopted = submissions.filter(s =>
      s.episode_id === cur.episode_id && (s.is_adopted === true || s.is_adopted === 'TRUE')
    );
    if (!adopted.length) break;
    let nextSub = adopted[0];
    if (adopted.length > 1) {
      const pick = choices && choices[cur.episode_id];
      if (!pick) return null; // 아직 갈래를 선택하지 않음 → action 섹션 숨김
      nextSub = adopted.find(s => s.sub_id === pick) || null;
      if (!nextSub) return null;
    }
    if (subToOpenEp[nextSub.sub_id]) return subToOpenEp[nextSub.sub_id];
    const kids = subToClosedEps[nextSub.sub_id] || [];
    if (!kids.length) break;
    cur = kids[0];
  }
  return openEps[0];
}

// 투표 pre-select 적용

function getEpisodeTree(episodes, submissions) {
  const subToChildEps = {};
  episodes.forEach(ep => {
    if (ep.parent_sub_id) {
      if (!subToChildEps[ep.parent_sub_id]) subToChildEps[ep.parent_sub_id] = [];
      subToChildEps[ep.parent_sub_id].push(ep);
    }
  });
  const rootEp = episodes.find(ep => !ep.parent_sub_id || ep.parent_sub_id === '');
  if (!rootEp) return null;

  function buildNode(ep) {
    const adoptedSubs = submissions.filter(s =>
      s.episode_id === ep.episode_id && (s.is_adopted === true || s.is_adopted === 'TRUE')
    );
    const children = adoptedSubs.flatMap(sub => (subToChildEps[sub.sub_id] || []).map(buildNode));
    return { ep, adoptedSubs, children };
  }
  return buildNode(rootEp);
}

function renderEpisodeTreeHtml(node, choices, mvpMap, branches, myMvpEpId) {
  if (!node) return '';
  mvpMap   = mvpMap   || {};
  branches = branches || [];
  const { ep, adoptedSubs, children } = node;
  if (ep.status !== 'closed') return '';
  if (adoptedSubs.length === 0) return '';

  const mvpCount  = mvpMap[ep.episode_id] || 0;
  const isMyMvp   = myMvpEpId === ep.episode_id;
  const mvpBadge  = mvpCount > 0 ? `<span class="prose-line-mvp">👍 ${mvpCount}</span>` : '';
  const myMvpMark = isMyMvp ? `<span class="prose-line-my-mvp">✦ 내가 선정함</span>` : '';

  // 외부 분기: 이 에피소드의 다음 단계(step+2, 1-based)에 분기가 있으면 포크 표시
  const extBranch = branches.find(b => b.branch_from_step === Number(ep.step) + 2);

  if (adoptedSubs.length === 1) {
    const sub = adoptedSubs[0];
    const childHtml = children.length === 1
      ? renderEpisodeTreeHtml(children[0], choices, mvpMap, branches, myMvpEpId) : '';
    const forkHtml = extBranch ? renderExtBranchFork(ep, sub, extBranch) : '';
    return `
      <div class="prose-line" data-episode-id="${ep.episode_id}" onclick="onPrseLineClick('${ep.episode_id}')">
        <span class="prose-sentence">${esc(sub.content)}</span>
        ${mvpBadge}${myMvpMark}
      </div>
      <span class="prose-author">— ${sub.author_badge?`<span class="badge badge-${sub.author_badge}" style="font-size:9px;padding:1px 4px;margin-right:2px">${badgeEmoji(sub.author_badge)}</span>`:''}${esc(sub.author_nickname || '익명')}</span>
      ${forkHtml}${childHtml}`;
  }

  // 동률 채택 분기 포인트
  const chosenSubId = choices[ep.episode_id];
  if (chosenSubId) {
    const chosenSub   = adoptedSubs.find(s => s.sub_id === chosenSubId);
    const chosenChild = children.find(c => c.ep.parent_sub_id === chosenSubId);
    return `
      <div class="branch-prose-row">
        <div class="branch-side-indicator">
          ${adoptedSubs.map((sub, i) => `
            <button class="branch-tab ${sub.sub_id === chosenSubId ? 'active' : ''}"
              onclick="chooseBranch('${ep.episode_id}','${sub.sub_id}')">
              ${String.fromCharCode(65+i)}갈래</button>`).join('')}
        </div>
        <div>
          <div class="prose-line" data-episode-id="${ep.episode_id}" onclick="onPrseLineClick('${ep.episode_id}')">
            <span class="prose-sentence">${esc(chosenSub ? chosenSub.content : '')}</span>
            ${mvpBadge}${myMvpMark}
          </div>
          <span class="prose-author">— ${chosenSub&&chosenSub.author_badge?`<span class="badge badge-${chosenSub.author_badge}" style="font-size:9px;padding:1px 4px;margin-right:2px">${badgeEmoji(chosenSub.author_badge)}</span>`:''}${esc(chosenSub?(chosenSub.author_nickname||'익명'):'')}</span>
        </div>
      </div>
      ${chosenChild ? renderEpisodeTreeHtml(chosenChild, choices, mvpMap, branches, myMvpEpId) : ''}`;
  }

  // 아직 선택 안 한 갈림길
  return `
    <div class="branch-chooser">
      <div class="branch-chooser-label">✦ 이야기의 갈림길 ✦</div>
      <div class="branch-choices">
        ${adoptedSubs.map((sub, i) => {
          const [bg, fg] = [
            ['rgba(70,110,85,.18)','#2a6040'],
            ['rgba(160,100,30,.18)','#7a4a10'],
            ['rgba(100,50,160,.18)','#5a2a90'],
          ][i] || ['rgba(70,110,85,.18)','#2a6040'];
          return `
          <button class="branch-choice-card" onclick="chooseBranch('${ep.episode_id}','${sub.sub_id}')">
            <div class="branch-choice-label" style="background:${bg};color:${fg};align-self:flex-start;margin-bottom:10px">${String.fromCharCode(65+i)}갈래</div>
            <div style="flex:1">${esc(sub.content)}</div>
            <div style="font-size:11px;color:var(--muted);font-weight:700;margin-top:10px">공감 ${sub.vote_count}개</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;
}

function renderExtBranchFork(ep, originalSub, extBranch) {
  const isActive = extBranch.status === 'active';
  return `
    <div class="ext-branch-fork">
      <div class="ext-branch-fork-label">⑂ 이야기의 갈림길</div>
      <div class="ext-branch-choices">
        <button class="ext-branch-card" style="cursor:default;opacity:.7">
          <div class="ext-branch-card-label">원본</div>
          <div>${esc(originalSub.content)}</div>
        </button>
        <button class="ext-branch-card" onclick="nav('story','${extBranch.story_id}')">
          <div class="ext-branch-card-label">분기 ${isActive ? '· 진행 중' : '· 완성됨'}</div>
          <div style="font-size:12px;color:var(--muted)">${isActive ? '지금 참여해서 이야기를 이어가세요 →' : '분기된 이야기 보기 →'}</div>

function toggleProseAuthors(btn) {
  const prose = document.getElementById('story-prose-wrap');
  if (!prose) return;
  const showing = btn.dataset.showing === '1';
  prose.querySelectorAll('.prose-author').forEach(el => el.classList.toggle('visible', !showing));
  btn.dataset.showing = showing ? '0' : '1';
  btn.textContent = showing ? '글쓴이 보기 ▾' : '글쓴이 숨기기 ▴';
}

function chooseBranch(episode_id, sub_id) {
  window._branchChoice = window._branchChoice || {};
  window._branchChoice[episode_id] = sub_id;
  if (!window._storyData) return;
  const { episodes, submissions, branches, mvp_map, my_mvp_episode_id, parent_chain } = window._storyData;

  // 산문 트리 재렌더
  const el = document.getElementById('story-prose-content');
  if (el) {
    let inheritedHtml = '';
    if (parent_chain && parent_chain.episodes.length) {
      const pTree = getEpisodeTree(parent_chain.episodes, parent_chain.submissions);
      inheritedHtml = pTree ? `<div class="prose-inherited">${renderEpisodeTreeHtml(pTree, {})}</div>` : '';
    }
    const tree = getEpisodeTree(episodes.filter(e => e.status === 'closed'), submissions);
    el.innerHTML = inheritedHtml + (tree ? renderEpisodeTreeHtml(tree, window._branchChoice, mvp_map, branches, my_mvp_episode_id) : '');
  }

  // 갈래 선택 시 산문뷰 왼쪽 탭 공간 확보
  const pw = document.getElementById('story-prose-wrap');
  if (pw) {
    pw.classList.add('has-branch-tabs');
    // 공감현황/으뜸글 모드 중이면 재렌더된 prose-author도 visible 복원
    if (window._proseSelMode) pw.querySelectorAll('.prose-author').forEach(el => el.classList.add('visible'));
  }

  // action 섹션 재렌더 (갈래에 맞는 open 에피소드로)
  const actionWrap = document.getElementById('story-action-wrap');
  if (actionWrap && window._storyData.story.status === 'active') {
    const newOpenEp = getChosenOpenEp(episodes, submissions, window._branchChoice);
    actionWrap.innerHTML = buildStoryActionHtml(newOpenEp);
    selectedSubs = [];
    _applyVoteSelections();
  }
}

function onPrseLineClick(episode_id) {
  if (!window._proseSelMode) return;
  if (window._proseSelMode === 'viewvotes') {
    cancelProseSelMode();
    nav('episode-votes', episode_id);
    return;
  }
  window._proseSelEpId = episode_id;
  document.querySelectorAll('#story-prose-wrap .prose-line').forEach(el => {
    el.classList.toggle('prose-selected', el.dataset.episodeId === episode_id);
  });
  const btn = document.getElementById('prose-sel-confirm');

let _obPage = 0, _obTouchX = null, _obMouseX = null, _obMouseDrag = false;

function showOnboarding() {
  _obPage = 0;
  _renderObPage(0);
  document.getElementById('onboarding-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeOnboarding() {
  localStorage.setItem('hwasee_onboarding_seen', '1');
  document.getElementById('onboarding-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
function _renderObPage(dir) {
  const content = document.getElementById('ob-content');
  const doUpdate = () => {
    const p = _OB_PAGES[_obPage];
    const imgWrap = document.getElementById('ob-img-wrap');
    imgWrap.innerHTML = p.img
      ? `<img src="/bang/${p.img}" alt="" onerror="this.parentElement.innerHTML='';">`
      : '';
    document.getElementById('ob-icon').textContent  = p.icon;
    document.getElementById('ob-title').textContent = p.title;
    document.getElementById('ob-body').innerHTML    = p.body;
    [0,1,2,3].forEach(i => {
      document.getElementById('ob-dot-'+i).className = 'ob-dot' + (i === _obPage ? ' active' : '');
    });
    document.getElementById('ob-actions').innerHTML =
      _obPage === _OB_PAGES.length - 1
        ? `<button class="ob-btn-start" onclick="closeOnboarding()">시작하기</button>`
        : '';
  };
  if (!dir) { doUpdate(); return; }
  content.style.transition = 'opacity .15s';
  content.style.opacity = '0';
  setTimeout(() => {
    doUpdate();
    requestAnimationFrame(() => {
      content.style.transition = 'opacity .2s';
      content.style.opacity = '1';
    });
  }, 150);
}
function _obNext() { if (_obPage < _OB_PAGES.length - 1) { _obPage++; _renderObPage(1); } else { closeOnboarding(); } }
function _obPrev() { if (_obPage > 0) { _obPage--; _renderObPage(-1); } }

(function() {
  const ov = document.getElementById('onboarding-overlay');
  ov.addEventListener('touchstart', e => { _obTouchX = e.touches[0].clientX; }, { passive: true });
  ov.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
  ov.addEventListener('touchcancel', () => { _obTouchX = null; });
  ov.addEventListener('touchend', e => {
    if (_obTouchX === null) return;
    const dx = e.changedTouches[0].clientX - _obTouchX;
    _obTouchX = null;
    if (Math.abs(dx) < 50) return;
    if (dx < 0) _obNext(); else _obPrev();
  });
  ov.addEventListener('mousedown', e => { _obMouseX = e.clientX; _obMouseDrag = false; });
  ov.addEventListener('mousemove', e => { if (_obMouseX !== null && Math.abs(e.clientX - _obMouseX) > 8) _obMouseDrag = true; });
  ov.addEventListener('mouseup', e => {
    if (_obMouseX === null) return;
    const dx = e.clientX - _obMouseX;
    const wasDrag = _obMouseDrag;
    _obMouseX = null; _obMouseDrag = false;
    if (!wasDrag) {
      if (!e.target.closest('button')) _obNext();
      return;
    }
    if (Math.abs(dx) < 50) return;
    if (dx < 0) _obNext(); else _obPrev();
  });
})();

async function loadMvpSection(story_id, submissions) {
  const el = document.getElementById('mvp-section');
  if (!el) return;

  // 채택된 제출의 고유 작성자 목록 (SYSTEM 제외)
  const winners = submissions.filter(s => s.is_adopted === true || s.is_adopted === 'TRUE');
  const seenIds = new Set();
  const authors = [];
  winners.forEach(s => {
    if (!seenIds.has(s.author_id) && s.author_id && s.author_id !== 'SYSTEM') {
      seenIds.add(s.author_id);
      authors.push({ user_id: s.author_id, nickname: s.author_nickname || '익명', badge: s.author_badge || 'seed' });

function toggleMvpVote(story_id, user_id, nickname) {
  const idx = _mvpSelected.indexOf(user_id);
  if (idx >= 0) {
    _mvpSelected.splice(idx, 1);
    document.getElementById('mvp-' + user_id)?.classList.remove('selected');
  } else {
    if (_mvpSelected.length >= 1) {
      const prev = _mvpSelected.shift();
      document.getElementById('mvp-' + prev)?.classList.remove('selected');
    }
    _mvpSelected.push(user_id);
    document.getElementById('mvp-' + user_id)?.classList.add('selected');
  }
  const btn = document.getElementById('mvp-submit-btn');
  if (btn) btn.disabled = _mvpSelected.length === 0;
}

async function submitMvpVote(story_id) {
  if (!_mvpSelected.length) return;
  const btn = document.getElementById('mvp-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = '공감 중...'; }
  const res = await api('voteMvp', { story_id, nominated_user_ids: _mvpSelected });
  if (!res.ok) { toast(res.error, true); if (btn) btn.disabled = false; return; }
  toast('공감 완료! 감사합니다 ✦');
  // 결과 새로 불러오기
  if (window._storyData) loadMvpSection(story_id, window._storyData.submissions);
}

function shareStory() {
  const d = window._storyData;
  if (!d) return;
  const { episodes, submissions, story } = d;

  const tree = getEpisodeTree(episodes.filter(e => e.status === 'closed'), submissions);

  function collectLines(node, choices) {
    if (!node || node.ep.status !== 'closed' || !node.adoptedSubs.length) return [];
    const chosenId = (choices || {})[node.ep.episode_id];
    const sub = (chosenId && node.adoptedSubs.find(s => s.sub_id === chosenId))
      || node.adoptedSubs[0];
    const child = node.children.find(c => c.ep.parent_sub_id === sub.sub_id);
    return [sub.content, ...collectLines(child, choices)];
  }

  const lines = collectLines(tree, window._branchChoice || {});
  const opening = story ? story.opening : '';
  const url = location.href;

  const text = [
    '화씨.방에서 함께 쓴 이야기',
    '',
    opening,
    ...lines,
    '',
    `👉 ${url}`,
  ].join('\n');

  navigator.clipboard.writeText(text)
    .then(() => toast('이야기가 클립보드에 복사됐습니다!'))
    .catch(() => toast('복사 실패 — 브라우저 권한을 확인해주세요.', true));
}

  if (!card) return;
  const opening = card.style.display === 'none';
  card.style.display = opening ? 'block' : 'none';
  if (opening) { refreshAvatarShop(); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

async function doSetAvatar(emoji_id) {
  const val = emoji_id || null;
  const res = await api('setAvatar', { emoji_id: val });
  if (!res.ok) { toast(res.error, true); return; }
  if (user) { user.avatar = res.avatar; saveUser(user); renderNav(); }
  if (_profileUser) { _profileUser.avatar = res.avatar; refreshAvatarShop(); }
}

async function doBuyAvatar(emoji_id) {
  const item = AVATAR_SHOP_ITEMS.find(x => x.id === emoji_id);
  if (!item) return;
  if (!confirm(`${item.id} ${item.label} 아이콘을 ${item.price.toLocaleString()}p에 구매할까요?`)) return;
  const res = await api('buyAvatar', { emoji_id });
  if (!res.ok) { toast(res.error, true); return; }
  toast(`${item.id} 구매 완료!`);
  if (user) { user.total_points = res.total_points; user.badge = res.badge; user.owned_avatars = res.owned_avatars; saveUser(user); renderNav(); }
  if (_profileUser) { _profileUser.total_points = res.total_points; _profileUser.owned_avatars = res.owned_avatars; }
  await doSetAvatar(emoji_id);
}

let _dnProfileTimer;
async function checkDnAvailProfile() {
  const el = document.getElementById('dn-new');
  const status = document.getElementById('dn-profile-status');
  if (!el || !status) return;
  const val = el.value.trim();
  status.textContent = '';
  clearTimeout(_dnProfileTimer);
  if (!val || val.length < 2) return;
  _dnProfileTimer = setTimeout(async () => {
    const res = await api('checkDisplayName', { display_name: val });
    if (!res.ok) return;
    status.textContent = res.available ? '✓ 사용가능' : '✗ 중복';
    status.style.color = res.available ? 'var(--success)' : 'var(--accent2)';
  }, 500);
}

async function doChangeDisplayName() {
  const val = document.getElementById('dn-new')?.value.trim();
  if (!val) { toast('새 닉네임을 입력해주세요.', true); return; }
  if (val.length < 2) { toast('닉네임은 2자 이상이어야 해요.', true); return; }
  const res = await api('changeDisplayName', { display_name: val });
  if (!res.ok) { toast(res.error, true); return; }
  user.display_name = res.display_name;
  saveUser(user);
  renderNav();
  toast(`닉네임이 "${res.display_name}"으로 변경됐어요!`);
  nav('profile', 'settings');
}

async function loadBugReportList() {
  const res = await api('getBugReports');
  const el = document.getElementById('bug-report-list');
  if (!el) return;
  if (!res.ok) { el.innerHTML = `<div class="empty">${res.error}</div>`; return; }
  if (!res.reports.length) { el.innerHTML = `<div class="empty">접수된 버그 제보가 없습니다.</div>`; return; }
  el.innerHTML = res.reports.map(r => `
    <div style="padding:14px 16px;margin-bottom:8px;border:1px solid ${r.status==='resolved'?'var(--border)':'var(--accent2)'};border-radius:10px;background:var(--card)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:var(--muted)">${esc(r.reporter_nickname)} · ${timeAgo(r.created_at)}</span>
        ${r.status==='resolved'
          ? `<span style="font-size:11px;color:var(--success);font-weight:600">✓ 해결됨</span>`
          : `<button onclick="doResolveBugReport('${r.id}')" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer">해결 완료</button>`}
      </div>
      <div style="font-size:14px;line-height:1.6;white-space:pre-wrap">${esc(r.content)}</div>
    </div>`).join('');
}

async function doResolveBugReport(report_id) {

  loadBugReportList();

function updateCount(inputId, countId) {
  const len = (document.getElementById(inputId).value || '').length;
  const el  = document.getElementById(countId);
  if (!el) return;
  const limit = inputId.includes('opening') ? null : 50;
  if (!limit) {
    el.textContent = `${len}자`;
    el.className = 'char-count';
  } else if (len > limit) {
    el.textContent = `${len} / ${limit}자`;
    el.className = 'char-count over';
  } else if (len >= 40) {
    el.textContent = `${len} / ${limit}자`;
    el.className = 'char-count warn';
  } else {
    el.textContent = `${len}자`;
    el.className = 'char-count';
  }
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60)    return '방금 전';
  if (diff < 3600)  return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return Math.floor(diff/86400) + '일 전';
}

  currentRoute = ['home','seed','popular','mine','done','story','episode','auth','profile','create','episode-votes'].includes(route) ? route : 'seed';
