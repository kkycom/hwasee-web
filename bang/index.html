<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화씨.방</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-api.js"></script>
<style>
  :root {
    --bg:      #0d0f0e;
    --surface: #151a16;
    --card:    #1c2320;
    --border:  #283029;
    --accent:  #68a882;
    --accent2: #c8a96e;
    --text:    #e4ebe6;
    --muted:   #6b7d6e;
    --success: #4ade80;
    --radius:  12px;
    --font:    'Noto Sans KR', system-ui, sans-serif;
    --serif:   'Gowun Batang', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── 헤더 */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,18,.88); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 20px; font-weight: 700; letter-spacing: .5px;
    font-family: var(--serif); color: var(--text); cursor: pointer;
  }
  .nav-right { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
  @media (max-width: 480px) {
    .nav-right { gap: 4px; }
    .nav-right .btn-sm { padding: 4px 8px; font-size: 12px; }
    .nav-right .badge { display: none; }
  }

  /* ── 프로필 드롭다운 */
  .profile-menu-wrap { position: relative; }
  .profile-menu-btn  { background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
  .profile-menu-btn:hover { background: var(--surface); }
  .profile-menu-btn .caret { font-size: 9px; color: var(--muted); transition: transform .15s; }
  .profile-menu-btn.open .caret { transform: rotate(180deg); }
  .profile-dropdown {
    display: none; position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); min-width: 168px; z-index: 200;
    overflow: hidden;
  }
  .profile-dropdown.open { display: block; }
  .profile-dropdown-header { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); }
  .profile-dropdown-nick { font-size: 13px; font-weight: 700; color: var(--text); }
  .profile-dropdown-badge { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .profile-dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; font-size: 13px; color: var(--text);
    background: none; border: none; width: 100%; text-align: left; cursor: pointer;
    transition: background .1s;
  }
  .profile-dropdown-item:hover { background: var(--surface); }
  .profile-dropdown-item.danger { color: #f87171; }
  .profile-dropdown-divider { height: 1px; background: var(--border); margin: 2px 0; }

  /* ── 버튼 */
  .btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6855e0; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-nav { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 8px; font-size: 13px; font-weight: 500; border-radius: 6px; }
  .btn-nav:hover { color: var(--text); background: var(--surface); }
  .story-card-wrap { position:relative; margin-bottom:12px; }
  .story-card-wrap.has-tabs { margin-top:20px; }
  .story-card-wrap > .story-card { margin-bottom:0; }
  .card-tab-row { position:absolute; bottom:100%; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-end; pointer-events:none; }
  .card-tab-left  { display:flex; gap:4px; pointer-events:all; }
  .card-tab-right { display:flex; gap:4px; pointer-events:all; }
  .card-tab { padding:4px 12px; font-size:10px; font-weight:700; letter-spacing:.04em; border-radius:6px 6px 0 0; border:1px solid transparent; border-bottom:none; }
  .card-tab-new    { background:#2a1e08; color:#c8a96e; border-color:rgba(200,169,110,.35); }
  .card-tab-branch { background:#0c1f15; color:#68a882; border-color:rgba(104,168,130,.35); }
  .card-tab-boost  { background:#1a0f1e; color:#c084fc; border-color:rgba(192,132,252,.35); }
  @keyframes card-shine {
    0%   { transform:translateX(-120%) skewX(-18deg); opacity:0; }
    15%  { opacity:1; }
    85%  { opacity:1; }
    100% { transform:translateX(260%) skewX(-18deg); opacity:0; }
  }
  .story-card-wrap.has-boost > .story-card { overflow:hidden; }
  .story-card-wrap.has-boost > .story-card::before {
    content:''; position:absolute; inset:0; border-radius:var(--radius);
    background:linear-gradient(105deg, transparent 35%, rgba(192,132,252,.07) 50%, transparent 65%);
    transform:translateX(-120%) skewX(-18deg);
    animation:card-shine 1.4s ease-out .2s 1 both;
    pointer-events:none;
  }
  .sort-btn { background:var(--surface); border:none; color:var(--muted); padding:5px 12px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer; transition:.15s; }
  .sort-btn.active { background:var(--accent); color:#fff; }

  /* ── 레이아웃 */
  main { max-width: 720px; margin: 0 auto; padding: 32px 16px 48px; }

  /* ── 랭킹 (씨앗 탭 하단 인라인 + 모달 공용) */
  .lb-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 12px; font-weight: 800; color: var(--muted); width: 16px; text-align: center; flex-shrink: 0; }
  .lb-rank.r1 { color: #ffd700; }
  .lb-rank.r2 { color: #b0b0b8; }
  .lb-rank.r3 { color: #cd7f32; }
  .lb-name { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-value { font-size: 11px; color: var(--accent); font-weight: 700; white-space: nowrap; flex-shrink: 0; }

  /* ── 랭킹 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 360px; max-height: 80vh; overflow-y: auto; }

  /* ── 카드 */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }

  /* ── 배지 */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-seed    { background: #1a2219; color: #5a7a5a; }
  .badge-seed1   { background: #1a2219; color: #7a9a7a; }
  .badge-seed2   { background: #172a1c; color: #4ade80; }
  .badge-sprout  { background: #172a1c; color: var(--success); }
  .badge-sprout1 { background: #1a2a20; color: var(--accent); }
  .badge-leaf    { background: #1a2a20; color: #68a882; }
  .badge-leaf1   { background: #1a3020; color: #8ecfa8; }
  .badge-bud     { background: #28221a; color: #d4a847; }
  .badge-flower  { background: #2a1e14; color: var(--accent2); }
  .badge-fruit   { background: #2a1a08; color: #f0b840; }
  .badge-treeguard { background: #0f2418; color: #4ade80; border: 1px solid #16a34a; }
  /* 레거시 뱃지 (기존 가입자) */
  .badge-new     { background: #1a2219; color: #5a7a5a; }
  .badge-rookie  { background: #172a1c; color: var(--success); }
  .badge-writer  { background: #1a2a20; color: var(--accent); }
  .badge-expert  { background: #28221a; color: #d4a847; }
  .badge-master  { background: #2a1e14; color: var(--accent2); }

  /* ── 폼 */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input, textarea {
    width: 100%; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 15px;
    outline: none; transition: .15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .char-count { font-size: 12px; color: var(--muted); text-align: right; margin-top: 4px; }
  .char-count.warn { color: #e0a040; }
  .char-count.over { color: var(--accent2); }

  /* ── 홈 스토리 카드 */
  .story-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 12px; cursor: pointer; transition: .15s; position: relative;
  }
  .story-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,106,255,.12); }
  .story-card-pending { border-color: rgba(255,170,0,.3); box-shadow: 0 0 0 1px rgba(255,170,0,.1); }
  .story-card-title { font-size: 15px; line-height: 1.6; margin-bottom: 10px; font-family: var(--serif); }
  .story-card-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .step-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600;
  }
  .step-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .story-status { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .status-active    { background: #0f2a1a; color: var(--success); }
  .status-completed { background: #1a1a2a; color: var(--muted); }

  /* ── 스토리 뷰 타임라인 */
  .story-timeline { position: relative; }
  .tl-item { display: flex; gap: 0; margin-bottom: 6px; }
  .tl-spine {
    display: flex; flex-direction: column; align-items: center;
    min-width: 40px; flex-shrink: 0;
  }
  .tl-spine-line { width: 2px; background: var(--border); flex: 1; min-height: 8px; }
  .tl-spine-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--bg);
  }
  .tl-body { flex: 1; padding: 0 0 16px 12px; }
  .tl-label { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
  .tl-bubble {
    border-radius: 10px; padding: 13px 16px;
    font-size: 15px; line-height: 1.7; font-family: var(--serif);
  }
  .tl-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── 투표 제출 카드 */
  .vote-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; transition: .15s;
  }
  .vote-card.clickable { cursor: pointer; }
  .vote-card.clickable:hover { border-color: var(--accent); }
  .vote-card.selected { border-color: var(--accent); background: #162218; box-shadow: 0 0 0 2px var(--accent); }
  .vote-card.adopted  { border-color: var(--success); }
  .vote-content { font-size: 15px; line-height: 1.75; margin-bottom: 8px; font-family: var(--serif); }
  .vote-meta { display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .vote-count { color: var(--accent); font-weight: 700; }
  .vote-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
  .vote-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .4s; }

  /* ── 댓글 */
  .comment-list { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
  .comment-item { padding: 7px 0; font-size: 13px; border-bottom: 1px solid var(--border); line-height: 1.5; }
  .comment-item:last-child { border-bottom: none; }
  .comment-author { color: var(--muted); font-size: 11px; margin-right: 6px; }
  .comment-time   { color: var(--muted); font-size: 11px; margin-left: 8px; }
  .comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .comment-input-row input { font-size: 13px; padding: 7px 12px; }

  /* ── 현재 투표 섹션 */
  .voting-header {
    background: linear-gradient(135deg,#1a1a30,#1a2030);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  /* ── 알림 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 20px; font-size: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 9999;
    opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--accent2); }

  /* ── 홈 탭 (4개, 가로 스크롤) */
  .home-tabs {
    display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  .home-tab {
    flex: 1; text-align: center; padding: 12px 8px; font-size: 13px; font-weight: 600;
    background: none; border: none; border-bottom: 2px solid transparent;
    border-right: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: .15s;
    white-space: nowrap; margin-bottom: -1px;
  }
  .home-tab:last-child { border-right: none; }
  .home-tab:hover { color: var(--text); background: var(--surface); }
  .home-tab.active { color: #fff; background: var(--accent); border-bottom-color: var(--accent); }
  @media (max-width: 480px) {
    .home-tab { padding: 10px 4px; font-size: 11px; }
  }

  /* ── 씨앗 피처 카드 */
  .seed-feature {
    background: linear-gradient(135deg,#1a1530,#161e30);
    border: 1px solid #3a2a5a; border-radius: var(--radius);
    padding: 32px 24px; text-align: center; margin-top: 4px;
  }
  .seed-feature-label { font-size: 12px; color: var(--accent2); font-weight: 700; letter-spacing: .06em; margin-bottom: 18px; }
  .seed-feature-text  { font-size: 17px; font-weight: 400; line-height: 1.9; margin-bottom: 24px; font-family: var(--serif); }

  /* ── 섹션 헤더 */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .06em; }

  /* ── MVP 따봉 */
  .mvp-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 16px; }
  .mvp-author-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; border: 1.5px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: border-color .15s, background .15s; }
  .mvp-author-card.selected { border-color: var(--accent); background: #162218; }
  .mvp-author-card.result { cursor: default; }
  .mvp-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mvp-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }

  /* ── 산문 이야기 */
  .story-prose {
    background-color: #f5f0e6;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 28px,
      rgba(160,130,80,.18) 28px,
      rgba(160,130,80,.18) 29px
    );
    border: 1px solid #ddd0b8;
    border-left: 3px solid rgba(180,110,80,.25);
    border-radius: var(--radius);
    padding: 28px 24px 28px 28px;
  }
  .prose-opening {
    font-family: var(--serif); font-size: 16px; line-height: 1.75;
    color: #2c1a0e;
  }
  .prose-line { margin-top: 28px; }
  .prose-sentence { font-family: var(--serif); font-size: 16px; line-height: 1.75; display: block; color: #2c1a0e; }
  .prose-author { font-size: 11px; color: #9a7060; display: none; text-align: right; margin-top: 4px; }
  .prose-author.visible { display: block; }
  .prose-branch { font-size: 10px; font-weight: 700; color: #b07040; flex-shrink: 0; }
  .prose-divider {
    display: flex; align-items: center; gap: 12px; margin: 24px 0;
    font-size: 12px; font-weight: 600; color: #8a6a50;
  }
  .prose-divider::before, .prose-divider::after { content:''; flex:1; height:1px; background:#cfc0a0; }
  .prose-author-toggle {
    font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border);
    cursor: pointer; padding: 3px 10px; border-radius: 12px;
    opacity: .8; transition: opacity .15s, border-color .15s;
  }
  .prose-author-toggle:hover { opacity: 1; border-color: var(--accent); color: var(--text); }

  /* ── 탭 */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { flex: 1; text-align: center; padding: 10px 8px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); margin-bottom: -1px; transition: .15s; white-space: nowrap; border-right: 1px solid var(--border); }
  .tab:last-child { border-right: none; }
  .tab.active { color: #fff; background: var(--accent); border-bottom-color: var(--accent); }
  @media (max-width: 480px) {
    .tab { padding: 8px 4px; font-size: 11px; }
  }

  /* ── 기타 */
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  h2 { font-size: 18px; margin-bottom: 16px; }
  p.desc { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .empty   { text-align: center; padding: 48px 0; color: var(--muted); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; background: var(--border); font-size: 12px; color: var(--muted); margin-right: 6px; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .08em; margin-bottom: 10px; }
  .participated-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); display: inline-block; margin-right: 6px; }

  /* ── 투표 고정 버튼 */
  .vote-sticky {
    position: sticky; bottom: 16px; text-align: center; margin-top: 16px; z-index: 10;
  }

  /* ── 알림 bell */
  .bell-btn { position:relative; background:none; border:none; cursor:pointer; color:var(--text); font-size:18px; padding:4px 6px; border-radius:6px; }
  .bell-btn:hover { background:var(--surface); }
  .bell-badge { position:absolute; top:2px; right:2px; min-width:16px; height:16px; border-radius:8px; background:var(--accent2); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 3px; pointer-events:none; }
  .notif-panel { position:absolute; top:calc(100% + 6px); right:0; width:300px; background:var(--card); border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.5); z-index:100; overflow:hidden; }
  .notif-item { padding:12px 14px; border-bottom:1px solid var(--border); font-size:13px; line-height:1.4; cursor:pointer; }
  .notif-item:hover { background:var(--surface); }
  .notif-item.unread { border-left:3px solid var(--accent2); padding-left:11px; }
  .notif-time { font-size:11px; color:var(--muted); margin-top:3px; }
  #notif-wrapper { position:relative; }

  /* ── 분기 뷰 */
  .branch-chooser { border:1px solid var(--accent2); border-radius:10px; padding:16px; margin:12px 0; }
  .branch-chooser-label { font-size:11px; color:var(--muted); text-align:center; letter-spacing:1px; margin-bottom:12px; }
  .branch-choices { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .branch-choice-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; cursor:pointer; text-align:left; font-size:13px; line-height:1.5; transition:border-color .15s; width:100%; }
  .branch-choice-card:hover { border-color:var(--accent2); }
  .branch-choice-label { font-size:10px; color:var(--accent2); font-weight:700; margin-bottom:6px; }
  .branch-indicator { display:flex; gap:4px; margin:2px 0 -4px; align-items:center; }
  .branch-tab { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; color:var(--muted); }
  .branch-tab.active { border-color:var(--accent2); color:var(--accent2); font-weight:700; }

  /* ── 곧 채택 예정 태그 */
  .pending-tag { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:700; background:#1a1000; color:var(--accent2); border:1px solid var(--accent2); }
  .admin-btn { padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); transition:opacity .15s; }
  .admin-btn:hover { opacity:.8; }
  .admin-delete { background:#2a0a0a; color:#ff6b6b; border-color:#ff6b6b44; }

  /* ── 관리자 */
  .admin-row { display:flex; gap:6px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .admin-btn { padding:3px 9px; border-radius:4px; border:none; font-size:11px; font-weight:700; cursor:pointer; transition:.1s; }
  .admin-adopt  { background:#2a1e0a; color:var(--accent2); }
  .admin-adopt:hover  { background:#3a2a10; }
  .admin-delete { background:#2a1010; color:#e07070; }
  .admin-delete:hover { background:#3a1818; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="nav('seed')">화씨.방</div>
  <div class="nav-right" id="nav-right"></div>
</header>

<main id="app"><div class="loading">불러오는 중...</div></main>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  설정
// ═══════════════════════════════════════════════════════════
// ─── API (Firebase) ───────────────────────────────────────

async function api(action, params = {}) {
  try {
    const result = await firebaseApi(action, params);
    if (!result.ok && result.error === '로그인이 필요합니다.' && localStorage.getItem('hwasee_token')) {
      logout();
      toast('세션이 만료됐습니다. 다시 로그인해주세요.', true);
    }
    return result;
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

// ─── 캐시 유틸 ────────────────────────────────────────────
const _lsc = {
  get(k) {
    try {
      const r = localStorage.getItem('hc:' + k);
      if (!r) return null;
      const p = JSON.parse(r);
      return Date.now() < p.e ? p.d : null;
    } catch { return null; }
  },
  set(k, d, s) {
    try { localStorage.setItem('hc:' + k, JSON.stringify({ d, e: Date.now() + s * 1000 })); } catch {}
  },
  del(...ks) { ks.forEach(k => { try { localStorage.removeItem('hc:' + k); } catch {} }); },
};

// ─── 탭 정렬 상태 ──────────────────────────────────────────
let _mineSort  = 'activity';
let _mineCache = null; // { active, snapshot }
let _popSort   = 'activity';
let _popCache  = null; // { stories }
let _doneSort  = 'activity';
let _doneCache = null; // { stories }

function _sortStories(stories, key) {
  const arr = [...stories];
  if (key === 'activity') return arr.sort((a, b) => (Number(b.activity_count)||0) - (Number(a.activity_count)||0));
  if (key === 'step')     return arr.sort((a, b) => (Number(b.current_step)||0)   - (Number(a.current_step)||0));
  if (key === 'likes')    return arr.sort((a, b) => (Number(b.like_count)||0)     - (Number(a.like_count)||0));
  return arr.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

function _sortBtns(prefix, keys, current) {
  return `<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    ${keys.map(([k,l]) =>
      `<button id="${prefix}-${k}" class="sort-btn ${current===k?'active':''}" onclick="${prefix==='ms'?'setMineSort':prefix==='ps'?'setPopSort':'setDoneSort'}('${k}')">${l}</button>`
    ).join('')}
  </div>`;
}

function setMineSort(key) {
  _mineSort = key;
  ['activity','step','latest'].forEach(k => {
    const el = document.getElementById('ms-' + k);
    if (el) el.classList.toggle('active', k === key);
  });
  renderMineCards();
}

function renderMineCards() {
  const content = document.getElementById('home-content');
  if (!content || !_mineCache) return;
  const { active, snapshot } = _mineCache;
  const sorted = _sortStories(active, _mineSort);
  content.innerHTML = _sortBtns('ms', [['activity','참여도 순'],['step','진행도 순'],['latest','최신 순']], _mineSort)
    + (sorted.length
      ? sorted.map(s => myStoryCardHtml(s, snapshot)).join('')
      : `<div class="empty" style="padding-top:30px">참여 중인 이야기가 없어요.<br>씨앗 탭에서 이야기를 시작해 보세요!</div>`);
}

function setPopSort(key) {
  _popSort = key;
  ['activity','step','latest'].forEach(k => {
    const el = document.getElementById('ps-' + k);
    if (el) el.classList.toggle('active', k === key);
  });
  renderPopCards();
}

function renderPopCards() {
  const content = document.getElementById('home-content');
  if (!content || !_popCache) return;
  const sorted = _sortStories(_popCache.stories, _popSort);
  content.innerHTML = _sortBtns('ps', [['activity','참여도 순'],['step','진행도 순'],['latest','최신 순']], _popSort)
    + (sorted.length
      ? sorted.map(s => popularCardHtml(s)).join('')
      : `<div class="empty" style="padding-top:40px">아직 이야기가 없어요.<br>씨앗 탭에서 첫 이야기를 시작해 보세요!</div>`);
}

function setDoneSort(key) {
  _doneSort = key;
  ['activity','likes','latest'].forEach(k => {
    const el = document.getElementById('ds-' + k);
    if (el) el.classList.toggle('active', k === key);
  });
  renderDoneCards();
}

function renderDoneCards() {
  const content = document.getElementById('home-content');
  if (!content || !_doneCache) return;
  const sorted = _sortStories(_doneCache.stories, _doneSort);
  content.innerHTML = _sortBtns('ds', [['activity','참여도 순'],['likes','추천 순'],['latest','최신 순']], _doneSort)
    + (sorted.length
      ? sorted.map(s => doneCardHtml(s)).join('')
      : `<div class="empty" style="padding-top:40px">아직 완결된 이야기가 없어요.<br>이야기에 참여해 함께 만들어 가요!</div>`);
}

// ─── 상태 ──────────────────────────────────────────────────

let user = null;

function loadUser() {
  const raw = localStorage.getItem('hwasee_user');
  if (raw) try {
    user = JSON.parse(raw);
    if (user && user.user_id) localStorage.setItem('hwasee_uid', user.user_id);
  } catch {}
}
function saveUser(u) {
  user = u;
  if (u) {
    localStorage.setItem('hwasee_token', u.token);
    localStorage.setItem('hwasee_user', JSON.stringify(u));
    if (u.user_id) localStorage.setItem('hwasee_uid', u.user_id);
  } else {
    localStorage.removeItem('hwasee_token');
    localStorage.removeItem('hwasee_user');
    localStorage.removeItem('hwasee_uid');
  }
  renderNav();
}

// ─── 토스트 ───────────────────────────────────────────────

let toastTimer;
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

// ─── 네비게이션 ───────────────────────────────────────────

let currentRoute = 'home';
let currentParam = null;

function nav(route, param) {
  if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; }
  currentRoute = route;
  currentParam = param || null;
  location.hash = param ? `${route}/${param}` : route;
  window.scrollTo(0, 0);
  render();
}

function render() {
  const routes = { home, seed: home, hot: home, mine: home, archive: home, story, episode, auth, profile, create };
  (routes[currentRoute] || home)();
}

function renderNav() {
  const el = document.getElementById('nav-right');
  const rankBtn = `<button class="btn-nav" onclick="openRankingModal()" title="명예의 전당" style="font-size:15px">🏆</button>`;
  if (user) {
    el.innerHTML = `
      <span class="badge badge-${user.badge}" style="margin-right:2px">${badgeLabel(user.badge)}</span>
      ${rankBtn}
      <div id="notif-wrapper">
        <button class="bell-btn" onclick="toggleNotifPanel()" id="bell-btn" title="알림">🔔
          <span class="bell-badge" id="bell-badge" style="display:none"></span>
        </button>
        <div id="notif-panel" style="display:none" class="notif-panel"></div>
      </div>
      ${isAdmin() ? `<button class="btn-nav" onclick="adminPanel()" title="신고 관리">⚠️</button>` : ''}
      <div class="profile-menu-wrap" id="profile-menu-wrap">
        <button class="profile-menu-btn" id="profile-menu-btn" onclick="toggleProfileMenu()">
          ${esc(user.display_name || user.nickname)} <span class="caret">▼</span>
        </button>
        <div class="profile-dropdown" id="profile-dropdown">
          <div class="profile-dropdown-header">
            <div class="profile-dropdown-nick">${esc(user.display_name || user.nickname)}</div>
            <div class="profile-dropdown-badge"><span class="badge badge-${user.badge}" style="font-size:10px">${badgeLabel(user.badge)}</span></div>
          </div>
          <button class="profile-dropdown-item" onclick="closeProfileMenu();nav('profile','points')">📊 포인트 내역</button>
          <button class="profile-dropdown-item" onclick="closeProfileMenu();nav('profile','settings')">⚙️ 회원정보 수정</button>
          <div class="profile-dropdown-divider"></div>
          <button class="profile-dropdown-item danger" onclick="closeProfileMenu();logout()">↩ 로그아웃</button>
        </div>
      </div>`;
    loadNotifCount();
  } else {
    el.innerHTML = `
      ${rankBtn}
      <button class="btn btn-ghost btn-sm" onclick="nav('auth','login')">로그인</button>
      <button class="btn btn-primary btn-sm" onclick="nav('auth','register')">회원가입</button>`;
  }
}

function badgeLabel(b) {
  return {
    seed:'씨앗', seed1:'금간 씨앗', seed2:'발아하는 씨앗',
    sprout:'새싹', sprout1:'무성한 새싹',
    leaf:'잎', leaf1:'넓은 잎',
    bud:'꽃봉오리', flower:'꽃', fruit:'열매',
    treeguard:'나무지기',
    new:'씨앗', rookie:'새싹', writer:'잎', expert:'꽃', master:'열매',
  }[b] || b;
}
function isAdmin() { return !!(user && user.is_admin); }
function logout() { saveUser(null); toast('로그아웃됐습니다.'); nav('seed'); }

function toggleProfileMenu() {
  const btn  = document.getElementById('profile-menu-btn');
  const drop = document.getElementById('profile-dropdown');
  if (!btn || !drop) return;
  const opening = !drop.classList.contains('open');
  drop.classList.toggle('open', opening);
  btn.classList.toggle('open', opening);
}
function closeProfileMenu() {
  const btn  = document.getElementById('profile-menu-btn');
  const drop = document.getElementById('profile-dropdown');
  if (btn)  btn.classList.remove('open');
  if (drop) drop.classList.remove('open');
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('profile-menu-wrap');
  if (wrap && !wrap.contains(e.target)) closeProfileMenu();
});
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── 홈 (4탭) ────────────────────────────────────────────

const HOME_TABS = [
  { key: 'seed',    label: '씨앗이 될 이야기' },
  { key: 'popular', label: '관심받는 이야기'  },
  { key: 'mine',    label: '참여 중인 이야기' },
  { key: 'done',    label: '완성된 이야기'     },
];

async function home() {
  const tab = ['seed','popular','mine','done'].includes(currentRoute) ? currentRoute : 'seed';

  const tabHtml = HOME_TABS.map(t => `
    <button class="home-tab ${t.key === tab ? 'active' : ''}"
            onclick="switchHomeTab('${t.key}')"
            id="htab-${t.key}">${t.label}</button>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="home-tabs">${tabHtml}</div>
    <div id="home-content"><div class="loading">불러오는 중...</div></div>`;

  await loadHomeTab(tab);
}

async function switchHomeTab(tab) {
  currentRoute = tab;
  location.hash = tab;
  HOME_TABS.forEach(t => {
    const el = document.getElementById('htab-' + t.key);
    if (el) el.classList.toggle('active', t.key === tab);
  });
  const content = document.getElementById('home-content');
  if (content) content.innerHTML = `<div class="loading">불러오는 중...</div>`;
  await loadHomeTab(tab);
}

async function loadHomeTab(tab) {
  const content = document.getElementById('home-content');
  if (!content) return;

  if (tab === 'seed') {
    let res;
    try { res = await api('getSeeds'); } catch(e) {
      content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('seed')">다시 시도</button></div>`;
      return;
    }
    window._seeds   = res.ok ? res.seeds : [];
    window._seedIdx = 0;
    renderSeedCard();
    // 씨앗 탭 하단 랭킹
    const lbSection = document.createElement('div');
    lbSection.style.cssText = 'margin-top:32px;border-top:1px solid var(--border);padding-top:24px';
    lbSection.innerHTML = `
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px;letter-spacing:.5px">✦ 명예의 전당</div>
      <div id="seed-lb-body"><div style="font-size:12px;color:var(--muted)">불러오는 중...</div></div>`;
    content.appendChild(lbSection);
    loadLeaderboard('seed-lb-body');

  } else if (tab === 'popular') {
    const _applyPop = (storiesRes, myRes) => {
      const myIds   = new Set((myRes?.ok ? myRes.stories : []).map(s => s.story_id));
      const stories = (storiesRes?.ok ? storiesRes.stories : []).filter(s => !myIds.has(s.story_id));
      _popCache = { stories };
      if (currentRoute === 'popular') renderPopCards();
    };
    const _cachedPop = _lsc.get('pop');
    if (_cachedPop) _applyPop(_cachedPop.storiesRes, _cachedPop.myRes);
    const _fetchPop = async () => {
      let storiesRes, myRes;
      try {
        const p = [api('getStories', { page: 1 })];
        if (user) p.push(api('getMyStories'));
        [storiesRes, myRes] = await Promise.all(p);
      } catch(e) {
        if (!_cachedPop) content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('popular')">다시 시도</button></div>`;
        return;
      }
      _lsc.set('pop', { storiesRes, myRes }, 150);
      _applyPop(storiesRes, myRes);
    };
    if (!_cachedPop) await _fetchPop(); else _fetchPop();

  } else if (tab === 'mine') {
    if (!user) {
      content.innerHTML = `<div class="empty" style="padding-top:60px">로그인하면 참여 중인 이야기를 볼 수 있어요.<br>
        <button class="btn btn-primary" style="margin-top:20px" onclick="nav('auth','login')">로그인</button></div>`;
      return;
    }
    let res;
    try { res = await api('getMyStories'); } catch(e) {
      content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('mine')">다시 시도</button></div>`;
      return;
    }
    const active = res.ok ? res.stories.filter(s => s.status === 'active') : [];
    const mineSnap = (() => { try { return JSON.parse(localStorage.getItem('mine_snap') || '{}'); } catch { return {}; } })();
    const newSnap = {};
    active.forEach(s => { newSnap[s.story_id] = { activity: Number(s.activity_count) || 0, step: Number(s.current_step) || 0 }; });
    try { localStorage.setItem('mine_snap', JSON.stringify(newSnap)); } catch {}
    _mineCache = { active, snapshot: mineSnap };
    renderMineCards();

  } else if (tab === 'done') {
    const _applyDone = (res) => {
      const stories = res?.ok ? res.stories : [];
      _doneCache = { stories };
      if (currentRoute === 'done') renderDoneCards();
    };
    const _cachedDone = _lsc.get('done');
    if (_cachedDone) _applyDone(_cachedDone);
    const _fetchDone = async () => {
      let res;
      try { res = await api('getStories', { page: 2 }); } catch(e) {
        if (!_cachedDone) content.innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="switchHomeTab('done')">다시 시도</button></div>`;
        return;
      }
      _lsc.set('done', res, 660);
      _applyDone(res);
    };
    if (!_cachedDone) await _fetchDone(); else _fetchDone();
  }
}

// 씨앗 카드 렌더
function renderSeedCard() {
  const content = document.getElementById('home-content');
  if (!content) return;
  const text = (window._seeds || [])[window._seedIdx || 0];
  if (!text) {
    content.innerHTML = `<div class="empty">씨앗 문장이 모두 소진됐어요.<br><span style="font-size:13px">새 문장 세트가 곧 추가됩니다.</span></div>`;
    return;
  }
  content.innerHTML = `
    <p style="font-family:var(--serif);font-size:16px;line-height:1.9;color:var(--muted);text-align:center;margin-bottom:28px">
      당신의 한 문장을 기다리는<br>이야기들이 있어요.
    </p>
    <div class="seed-feature">
      <div class="seed-feature-label">이런 이야기는 어때요?</div>
      <div class="seed-feature-text">"${esc(text)}"</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startSeedStory()">이 문장으로 시작하기</button>
        <button class="btn btn-ghost"   onclick="nextSeed()">다른 문장 ↻</button>
      </div>
    </div>
    <div style="margin-top:10px">
      <button class="btn btn-primary" onclick="nav('create')" style="width:100%">✏️ 씨앗 문장 직접 만들기</button>
    </div>
    ${!user ? `<p style="margin-top:16px;text-align:center;font-size:13px;color:var(--muted)">
      시작하려면 <button class="btn btn-ghost btn-sm" onclick="nav('auth','login')">로그인</button>이 필요해요</p>` : ''}`;
}

function nextSeed() {
  const seeds = window._seeds || [];
  if (!seeds.length) return;
  window._seedIdx = ((window._seedIdx || 0) + 1) % seeds.length;
  renderSeedCard();
}

async function startSeedStory() {
  if (!user) { nav('auth', 'register'); return; }
  const text = (window._seeds || [])[window._seedIdx || 0];
  if (!text) return;
  const btn = document.querySelector('.seed-feature .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '시작 중...'; }
  const res = await api('createStory', { opening: text });
  if (!res.ok) { toast(res.error, true); if (btn) { btn.disabled = false; btn.textContent = '이 문장으로 시작하기'; } return; }
  _lsc.del('pop', 'done', 'lb');
  toast('이야기가 시작됐습니다!');
  nav('story', res.story_id);
}

// 관심받는 이야기 카드
function popularCardHtml(s) {
  const step  = Number(s.current_step) || 0;
  const count = Number(s.activity_count || s.participant_count) || 0;
  const leftTabs  = s.has_branch ? '<span class="card-tab card-tab-branch">⑂ 분기</span>' : '';
  const rightTabs = s.is_boosted ? '<span class="card-tab card-tab-boost">주목</span>' : '';
  const hasTabs = s.is_boosted || s.has_branch;
  const tabRow = hasTabs ? `<div class="card-tab-row"><div class="card-tab-left">${leftTabs}</div><div class="card-tab-right">${rightTabs}</div></div>` : '';
  return `
    <div class="story-card-wrap${hasTabs ? ' has-tabs' : ''}${s.is_boosted ? ' has-boost' : ''}">
      ${tabRow}
      <div class="story-card${s.has_pending ? ' story-card-pending' : ''}" onclick="nav('story','${esc(s.story_id)}')">
        <div class="story-card-title">${esc(s.opening)}</div>
        <div class="story-card-footer">
          <span class="step-pill"><span class="step-dot"></span>${step+1}단계 · 참여자 ${count}명</span>
          ${s.has_pending ? `<span class="pending-tag">⏳ 곧 채택 예정</span>` : ''}
          <span style="font-size:12px;color:var(--muted);margin-left:auto">${timeAgo(s.created_at)}</span>
        </div>
      </div>
    </div>`;
}

// 완결된 이야기 카드
function doneCardHtml(s) {
  const step  = Number(s.current_step) || 0;
  const likes = Number(s.like_count) || 0;
  return `
    <div class="story-card" onclick="nav('story','${esc(s.story_id)}')">
      <div class="story-card-title">${esc(s.opening)}</div>
      <div class="story-card-footer">
        <span class="step-pill">${step}단계 완성</span>
        ${likes > 0 ? `<span style="font-size:12px;color:var(--accent);margin-left:8px">👍 ${likes}</span>` : ''}
        <span style="font-size:12px;color:var(--muted);margin-left:auto">${timeAgo(s.created_at)}</span>
      </div>
    </div>`;
}


function myStoryCardHtml(s, snapshot) {
  const step    = Number(s.current_step) || 0;
  const mySubs  = s.mySubmissions || [];
  const stored  = snapshot && snapshot[s.story_id];
  const isNew   = stored && (
    Number(s.activity_count) > (stored.activity || 0) ||
    step > (stored.step || 0)
  );
  const hasVoted    = s.has_voted_current === true;
  const canVoteNow  = s.has_voted_current === false; // false = 진행 중이나 아직 미투표
  const leftTabsHtml = [
    isNew       ? '<span class="card-tab card-tab-new">NEW</span>'        : '',
    s.has_branch? '<span class="card-tab card-tab-branch">⑂ 분기</span>' : '',
  ].join('');
  const hasTabs = isNew || s.has_branch;
  const tabRow = hasTabs ? `<div class="card-tab-row"><div class="card-tab-left">${leftTabsHtml}</div><div class="card-tab-right"></div></div>` : '';
  return `
    <div class="story-card-wrap${hasTabs ? ' has-tabs' : ''}">
      ${tabRow}
      <div class="story-card" onclick="nav('story','${esc(s.story_id)}')">
      <div class="story-card-title">${esc(s.opening)}</div>
      ${mySubs.length ? `
        <div style="margin-bottom:10px;padding:10px 12px;background:var(--surface);border-radius:8px;border-left:3px solid var(--accent2)">
          ${mySubs.map(sub => `
            <div style="font-size:13px;line-height:1.6;margin-bottom:2px">${esc(sub.content)}</div>
            <div style="font-size:12px;color:var(--muted)">
              ▲ ${sub.vote_count}표
              ${sub.is_adopted===true||sub.is_adopted==='TRUE'?'<span style="color:var(--success);margin-left:6px">✓ 채택됨</span>':''}
            </div>`).join('')}
        </div>` : ''}
      <div class="story-card-footer">
        <span class="step-pill"><span class="step-dot"></span>${step+1}단계 · 참여자 ${Number(s.activity_count||s.participant_count)||0}명</span>
        ${hasVoted ? `<span style="font-size:11px;color:var(--success);font-weight:700">✓ 투표완료</span>`
          : canVoteNow ? `<span style="font-size:11px;color:var(--accent2);font-weight:700">▲ 투표가능</span>` : ''}
        ${s.has_pending ? `<span class="pending-tag pending-countdown" data-expires="${s.pending_expires_at||''}">⏳ 곧 채택 예정</span>` : ''}
        <span style="font-size:12px;color:var(--muted);margin-left:auto">${timeAgo(s.created_at)}</span>
      </div>
      </div>
    </div>`;
}

function create() {
  if (!user) { nav('auth','login'); return; }
  document.getElementById('app').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="nav('seed')" style="margin-bottom:20px">← 목록으로</button>
    <h2>새 이야기 시작</h2>
    <p class="desc">첫 문장을 쓰세요. 이 문장이 이야기의 씨앗이 됩니다.</p>
    <div class="card">
      <div class="form-group">
        <label>시작 문장</label>
        <textarea id="opening" rows="3" placeholder="예: 그날 밤, 버스는 오지 않았다." oninput="updateCount('opening','oc')"></textarea>
        <div class="char-count" id="oc">0자</div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="submitStory()">이야기 시작</button>

async function submitStory() {
  const opening = document.getElementById('opening').value.trim();
  if (!opening) { toast('시작 문장을 입력해주세요.', true); return; }
  const btn = document.querySelector('#app .btn-primary');
  btn.disabled = true; btn.textContent = '생성 중...';
  const res = await api('createStory', { opening });
  if (!res.ok) { toast(res.error, true); btn.disabled = false; btn.textContent = '이야기 시작'; return; }
  _lsc.del('pop', 'done', 'lb');
  toast('이야기가 시작됐습니다!');
  nav('story', res.story_id);
}

async function story() {

          <div id="polish-indicator" style="display:none;font-size:12px;color:var(--accent2);margin-bottom:8px;padding:6px 10px;background:var(--surface);border-radius:6px;border-left:2px solid var(--accent2)"></div>

          <div class="char-count" id="sub-cc" style="margin-bottom:10px">0자</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${Number(openEp.step) >= 2
              ? `<button class="btn btn-primary btn-sm" onclick="submitSubInStory('${esc(openEp.episode_id)}', false)">이야기를 열어두고 제출</button>

              : `<button class="btn btn-primary btn-sm" onclick="submitSubInStory('${esc(openEp.episode_id)}', false)">제출</button>`}
          </div>
        </div>` : ''}
      ${user && mySubId ? `
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px;padding:10px 14px;background:var(--surface);border-radius:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">

          <button class="btn btn-ghost btn-sm" style="font-size:12px;white-space:nowrap"

          참여하려면 <button class="btn btn-ghost btn-sm" onclick="nav('auth','login')">로그인</button>이 필요합니다.
        </div>` : ''}

      ${user && openSubs.length > 0 ? `

    actionHtml = `
      <div class="prose-divider">완결된 이야기입니다</div>

        <button class="btn btn-ghost btn-sm" onclick="shareStory()">🔗 공유하기</button>

  document.getElementById('app').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
      <button class="btn btn-ghost btn-sm" onclick="nav('popular')">← 목록으로</button>
      ${user ? `

          onclick="toggleBookmark('${esc(s.story_id)}', this)">
          ${is_bookmarked ? '★ 책갈피됨' : '☆ 책갈피'}
        </button>` : ''}
      ${user && s.status === 'active' ? `
        <button class="btn btn-ghost btn-sm" style="color:var(--muted)"
          onclick="doBoostStory('${esc(s.story_id)}')">⭐ 주목 (30P)</button>` : ''}
      ${isAdmin() && s.status === 'active' ? `
        <button class="admin-btn admin-delete" style="margin-left:auto" onclick="adminCloseStory('${esc(s.story_id)}')">✕ 이야기 종료</button>` : ''}
    </div>
    <div style="text-align:right;margin-bottom:6px">
      <button class="prose-author-toggle" id="prose-author-btn" onclick="toggleProseAuthors(this)">글쓴이 보기 ▾</button>
    </div>
    <div class="story-prose" id="story-prose-wrap">
      <div class="prose-opening">${esc(s.opening)}</div>
      ${confirmedHtml || ''}
    </div>
    ${actionHtml}
    ${isFinished ? `
      <div style="margin-top:8px">
        <button class="btn btn-ghost btn-sm" style="width:100%;color:var(--muted);font-size:12px"

        <div id="history-body" style="display:none;margin-top:12px">
          ${renderHistoryPanel(episodes, submissions)}
        </div>
      </div>
      <div id="mvp-section" style="margin-top:16px">
        <div style="font-size:12px;color:var(--muted);text-align:center">불러오는 중...</div>
      </div>
      <div style="margin-top:32px">
        <h3 style="margin-bottom:14px;font-size:16px">이야기 감상 나누기</h3>
        <div id="story-comment-list">
          <div style="color:var(--muted);font-size:13px">불러오는 중...</div>
        </div>
        ${user ? `
          <div class="comment-input-row" style="margin-top:12px">
            <input type="text" id="sc-input" maxlength="300" placeholder="감상을 남겨보세요..."

function toggleHistory() {
  const el = document.getElementById('history-body');
  if (!el) return;
  const btn = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    if (btn) btn.textContent = '만들어진 과정 접기 ▴';
  } else {
    el.style.display = 'none';
    if (btn) btn.textContent = '만들어진 과정 보기 ▾';
  }
}

function renderHistoryPanel(episodes, submissions) {
  const closedEps = episodes
    .filter(e => e.status === 'closed')
    .sort((a, b) => Number(a.step) - Number(b.step));
  if (!closedEps.length) return '<div style="color:var(--muted);font-size:13px;padding:12px 0">기록이 없습니다.</div>';
  return closedEps.map(ep => {
    const epSubs = submissions
      .filter(s => s.episode_id === ep.episode_id)
      .sort((a, b) => Number(b.vote_count) - Number(a.vote_count));
    return `
      <div style="margin-bottom:20px">
        <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:1px">${Number(ep.step)+1}단계</div>
        ${epSubs.map(sub => {
          const adopted = sub.is_adopted === true || sub.is_adopted === 'TRUE';
          return `
            <div style="padding:10px 12px;margin-bottom:6px;border-radius:8px;border:1px solid ${adopted?'var(--success)':'var(--border)'};background:${adopted?'#0c1f12':'var(--card)'}">
              <div style="font-size:13px;line-height:1.5">${esc(sub.content)}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:8px">
                <span>✍ ${esc(sub.author_nickname || '익명')}</span>
                <span>▲ ${sub.vote_count}표</span>
                ${adopted ? '<span style="color:var(--success)">✓ 채택</span>' : ''}
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

async function loadStoryComments(story_id) {
  const el = document.getElementById('story-comment-list');
  if (!el) return;
  try {
    const res = await api('getStoryComments', { story_id });
    const comments = res.ok ? res.comments : [];
    el.innerHTML = renderStoryCommentList(comments, story_id);
  } catch(e) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted)">불러올 수 없습니다.</div>';
  }
}

function renderStoryCommentList(comments, story_id) {
  return `
    <div class="comment-list">
      ${comments.length === 0
        ? '<div style="font-size:13px;color:var(--muted);padding:6px 0">첫 번째 감상을 남겨보세요.</div>'
        : comments.map(c => `
            <div class="comment-item">
              <span class="comment-author">${esc(c.author_nickname || '익명')}</span>${esc(c.content)}<span class="comment-time">${timeAgo(c.created_at)}</span>
            </div>`).join('')}
    </div>`;
}

async function submitStoryComment(story_id) {
  const input = document.getElementById('sc-input');
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  const res = await api('addStoryComment', { story_id, content });
  if (!res.ok) { toast(res.error, true); return; }
  input.value = '';
  loadStoryComments(story_id);
}

function renderSubsWithReplies(subs, mySubId, maxVotes, myVotedSet = new Set()) {
  const subIds = new Set(subs.map(s => s.sub_id));
  const roots  = subs.filter(s => !s.derived_from || !subIds.has(s.derived_from));
  const childMap = {};
  subs.forEach(s => {
    if (s.derived_from && subIds.has(s.derived_from)) {
      if (!childMap[s.derived_from]) childMap[s.derived_from] = [];
      childMap[s.derived_from].push(s);
    }
  });
  return roots.map(root => {
    const children = childMap[root.sub_id] || [];
    return renderVoteCard(root, mySubId, maxVotes, myVotedSet) +
      children.map(child => `
        <div style="display:flex;gap:8px;margin-top:-8px;margin-bottom:10px;padding-left:12px">
          <div style="display:flex;flex-direction:column;align-items:center;padding-top:8px;flex-shrink:0">
            <div style="width:1px;height:12px;background:var(--border)"></div>
            <span style="font-size:13px;color:var(--muted);line-height:1">↳</span>
          </div>
          <div style="flex:1">${renderVoteCard(child, mySubId, maxVotes, myVotedSet)}</div>
        </div>`).join('');
  }).join('');
}

function renderVoteCard(sub, mySubId, maxVotes, myVotedSet = new Set()) {
  const isAdopted   = sub.is_adopted === true || sub.is_adopted === 'TRUE';
  const iVoted      = myVotedSet.has(sub.sub_id);
  const voteCount   = Number(sub.vote_count) || 0;
  const barPct      = Math.min(Math.round(voteCount / FB_VOTE_THRESHOLD * 100), 100);
  const isClickable = user && sub.sub_id !== mySubId && !isAdopted;

  return `
    <div class="vote-card ${isAdopted?'adopted':''} ${isClickable?'clickable':''}" id="sc-${sub.sub_id}"
      style="${iVoted?'border-color:var(--accent);':''}"
      ${isClickable ? `onclick="toggleSub('${sub.sub_id}')"` : ''}>
      ${sub.closing ? `<div style="font-size:10px;font-weight:700;color:var(--accent2);margin-bottom:6px;letter-spacing:.04em">◼ 닫는 이야기</div>` : `<div style="font-size:10px;font-weight:700;color:#68c8a8;margin-bottom:6px;letter-spacing:.04em">▶ 열린 이야기</div>`}
      <div class="vote-content">${esc(sub.content)}</div>
      <div class="vote-meta">
        <span>✍ ${sub.author_badge ? `<span class="badge badge-${sub.author_badge}" style="font-size:9px;padding:1px 5px;margin-right:2px">${badgeLabel(sub.author_badge)}</span>` : ''}${esc(sub.author_nickname || '익명')}</span>
        <span class="vote-count">▲ ${voteCount}/${FB_VOTE_THRESHOLD}표</span>
        ${iVoted ? '<span style="font-size:11px;color:var(--accent);font-weight:700">✓ 내가 투표함</span>' : ''}
        ${sub.sub_id === mySubId ? '<span class="tag">내 제출</span>' : ''}
        ${sub.derived_from ? '<span class="tag">손본 글</span>' : ''}
        ${isAdopted ? '<span style="color:var(--success)">✓ 채택됨</span>' : ''}
      </div>
      <div class="vote-bar"><div class="vote-fill" style="width:${barPct}%"></div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" style="font-size:12px;padding:3px 10px"
          onclick="event.stopPropagation();toggleComments('${sub.sub_id}')">
          💬 댓글
        </button>
        ${user && !mySubId && !isAdopted && !sub.derived_from ? `
          <button class="btn btn-ghost btn-sm" style="font-size:12px;padding:3px 10px;color:var(--accent2)"
            onclick="event.stopPropagation();polishSub('${sub.sub_id}','${esc(sub.content).replace(/'/g,"\\'")}','${esc(sub.author_nickname||'익명')}')">
            ✏ 다듬어서 제안하기
          </button>` : ''}
      </div>
      ${user && sub.sub_id !== mySubId ? `
        <div style="margin-top:2px">
          <button style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;opacity:0.6"
            onclick="event.stopPropagation();toggleReport('${sub.sub_id}')">신고</button>
          <div id="report-${sub.sub_id}" style="display:none;margin-top:6px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">신고 사유를 선택해주세요</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              ${[['plagiarism','표절'],['sexual','성적 묘사'],['profanity','욕설·혐오'],['spam','스팸'],['other','기타']].map(([v,l])=>`
                <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px"
                  onclick="event.stopPropagation();submitReport('${sub.sub_id}','${v}')">${l}</button>`).join('')}
            </div>
          </div>
        </div>` : ''}
      ${isAdmin() ? `
        <div class="admin-row">
          ${!isAdopted ? `<button class="admin-btn admin-adopt" onclick="event.stopPropagation();adminForceAdopt('${sub.sub_id}')">✓ 채택 강행</button>` : ''}
          <button class="admin-btn admin-delete" onclick="event.stopPropagation();adminDeleteSub('${sub.sub_id}')">✕ 삭제</button>
        </div>` : ''}
      <div id="comments-${sub.sub_id}" style="display:none"></div>
    </div>`;
}

let _lbData = null;

async function loadLeaderboard(targetId) {
  if (!_lbData) _lbData = _lsc.get('lb');
  if (_lbData && targetId) renderLbInto(targetId);
  const _refresh = async () => {
    try {
      const res = await api('getLeaderboard', {});
      if (!res.ok) { if (targetId) renderLbInto(targetId); return; }
      _lbData = res;
      _lsc.set('lb', res, 360);
      if (targetId) renderLbInto(targetId);
      const modal = document.getElementById('modal-lb-body');
      if (modal) modal.innerHTML = lbBodyHtml(10);
    } catch(e) { if (targetId) renderLbInto(targetId); }
  };
  if (!_lbData) await _refresh(); else _refresh();
}

function renderLbInto(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = _lbData
    ? lbBodyHtml()
    : '<div style="font-size:12px;color:var(--muted)">랭킹을 불러올 수 없습니다.</div>';
}

function lbBodyHtml(limit) {
  if (!_lbData) return '<div style="font-size:12px;color:var(--muted)">아직 기록이 없어요.</div>';
  const n = limit || 10;
  const emptyHtml = '<div style="font-size:12px;color:var(--muted);padding:12px 0;text-align:center">아직 기록이 없어요.</div>';

  const pointRows = (_lbData.points || []).slice(0, n);
  const pointHtml = pointRows.length
    ? pointRows.map((r, i) => `
        <div class="lb-row">
          <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
          <span class="badge badge-${r.badge||'seed'}" style="font-size:9px;padding:1px 4px;flex-shrink:0">${badgeLabel(r.badge||'seed')}</span>
          <span class="lb-name">${esc(r.nickname)}</span>
          <span class="lb-value">${r.value||0}p</span>
        </div>`).join('')
    : emptyHtml;

  const adoptRows = (_lbData.adoptions || []).slice(0, n);
  const adoptHtml = adoptRows.length
    ? adoptRows.map((r, i) => `
        <div class="lb-row">
          <span class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span>
          <span class="badge badge-${r.badge||'seed'}" style="font-size:9px;padding:1px 4px;flex-shrink:0">${badgeLabel(r.badge||'seed')}</span>
          <span class="lb-name">${esc(r.nickname)}</span>
          <span class="lb-value">${r.value||0}편</span>
        </div>`).join('')
    : emptyHtml;

  return `<div style="display:flex;max-width:420px;margin:0 auto">
    <div style="flex:1;padding:0 14px;border-right:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;text-align:center">포인트 랭킹</div>
      ${pointHtml}
    </div>
    <div style="flex:1;padding:0 14px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;text-align:center">채택 랭킹</div>
      ${adoptHtml}
    </div>
  </div>`;
}

}

async function submitReport(sub_id, reason) {

  if (el) el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:2px 0">신고가 접수됐습니다.</div>';

async function toggleComments(sub_id) {
  const el = document.getElementById('comments-' + sub_id);
  if (!el) return;
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }

  // 캐시 없으면 fetch
  if (!commentCache[sub_id]) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:8px 0">불러오는 중...</div>';
    el.style.display = 'block';
    try {
      const res = await api('getComments', { sub_id });
      commentCache[sub_id] = res.ok ? res.comments : [];
    } catch(e) {
      commentCache[sub_id] = [];
    }
  }
  el.innerHTML = renderCommentsInner(sub_id, commentCache[sub_id] || []);
  el.style.display = 'block';
}

function renderCommentsInner(sub_id, comments) {
  return `
    <div class="comment-list">
      ${comments.length === 0
        ? '<div style="font-size:13px;color:var(--muted);padding:6px 0">첫 댓글을 남겨보세요.</div>'
        : comments.map(c => `
            <div class="comment-item">
              <span class="comment-author">${esc(c.author_nickname || c.author_id.slice(0,6))}</span>${esc(c.content)}<span class="comment-time">${timeAgo(c.created_at)}</span>
            </div>`).join('')}
      ${user ? `
        <div class="comment-input-row">
          <input type="text" id="ci-${sub_id}" maxlength="100" placeholder="댓글 달기..."
            onclick="event.stopPropagation()"
            onkeydown="if(event.key==='Enter'){event.stopPropagation();addComment('${sub_id}')}">
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();addComment('${sub_id}')">등록</button>
        </div>` : ''}
    </div>`;
}

function toggleSub(sub_id) {
  const idx = selectedSubs.indexOf(sub_id);
  if (idx >= 0) {
    selectedSubs.splice(idx, 1);
    document.getElementById('sc-' + sub_id).classList.remove('selected');
  } else {
    if (selectedSubs.length >= 2) {
      const oldest = selectedSubs.shift();
      const oldEl = document.getElementById('sc-' + oldest);
      if (oldEl) oldEl.classList.remove('selected');
    }
    selectedSubs.push(sub_id);
    document.getElementById('sc-' + sub_id).classList.add('selected');
  }
  const btn = document.getElementById('vote-btn');
  if (btn) btn.textContent = selectedSubs.length === 0
    ? '2개 선택 가능'
    : selectedSubs.length >= 2
      ? '투표하기'
      : '투표하기 · 1개 더 고를 수 있어요';
}

async function submitSubInStory(episode_id, closing = false) {
  const content = document.getElementById('sub-input').value.trim();
  if (!content) { toast('문장을 입력해주세요.', true); return; }
  if (content.length > 50) { toast('조금 더 짧게 써주세요.', true); return; }
  const derived_from = window._polishFrom || '';
  const res = await api('createSubmission', { episode_id, content, derived_from, closing });
  if (!res.ok) { toast(res.error, true); return; }
  window._polishFrom = null;
  _lsc.del('pop', 'done');
  toast(closing ? '제출 완료! 이야기 마무리 투표가 시작됩니다.' : '제출 완료!');
  story();
}

function polishSub(sub_id, content, author_nickname) {
  window._polishFrom = sub_id;
  const input = document.getElementById('sub-input');
  if (!input) { toast('먼저 이어 쓰기 칸을 찾을 수 없습니다.', true); return; }
  input.value = content;
  updateCount('sub-input', 'sub-cc');
  const ind = document.getElementById('polish-indicator');
  if (ind) { ind.style.display = 'block'; ind.textContent = `✏ "${author_nickname}"의 글을 손보는 중`; }
  input.focus(); input.select();
  input.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function toggleBookmark(story_id, btn) {
  if (!user) { toast('로그인이 필요합니다.', true); return; }
  const isMarked = btn.textContent.includes('★');
  const res = await api(isMarked ? 'removeBookmark' : 'addBookmark', { story_id });
  if (!res.ok && !res.already) { toast(res.error, true); return; }
  btn.textContent  = isMarked ? '☆ 책갈피' : '★ 책갈피됨';
  btn.style.color  = isMarked ? 'var(--muted)' : 'var(--accent2)';
  toast(isMarked ? '책갈피 해제됐습니다.' : '책갈피에 추가됐습니다.');
}

async function submitVoteInStory(episode_id) {
  if (!selectedSubs.length) { toast('문장을 선택해주세요.', true); return; }
  const btn = document.getElementById('vote-btn');
  if (btn) { btn.disabled = true; btn.textContent = '투표 중...'; }
  const res = await api('vote', { episode_id, sub_ids: selectedSubs });
  if (!res.ok) { toast(res.error, true); if (btn) btn.disabled = false; return; }
  _lsc.del('pop', 'done');
  toast(`투표 완료! 현재 ${res.total_voters}명 참여`);
  story();
}

async function addComment(sub_id) {
  if (!user) { toast('로그인이 필요합니다.', true); return; }
  const input = document.getElementById('ci-' + sub_id);
  if (!input) return;
  const content = input.value.trim();
  if (!content) { toast('댓글 내용을 입력해주세요.', true); return; }
  const res = await api('addComment', { sub_id, content });
  if (!res.ok) { toast(res.error, true); return; }
  input.value = '';
  toast('댓글 등록!');
  // 캐시 무효화 후 댓글 섹션만 새로고침
  delete commentCache[sub_id];
  const el = document.getElementById('comments-' + sub_id);
  if (el && el.style.display !== 'none') {
    try {
      const r2 = await api('getComments', { sub_id });
      commentCache[sub_id] = r2.ok ? r2.comments : [];
      el.innerHTML = renderCommentsInner(sub_id, commentCache[sub_id]);
    } catch(e) {}
  }
}

async function episode() {
  const episode_id = currentParam;
  selectedSubs = [];
  document.getElementById('app').innerHTML = `<div class="loading">불러오는 중...</div>`;

  let res;
  try {
    res = await api('getEpisode', { episode_id });
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="empty">불러오기 실패. <button class="btn btn-ghost btn-sm" onclick="episode()">다시 시도</button></div>`;
    return;
  }
  if (!res.ok) { document.getElementById('app').innerHTML = `<div class="empty">${esc(res.error)}</div>`; return; }

  const ep           = res.episode;
  const prevChain    = res.prevChain || [];
  const storyOpening = res.story ? res.story.opening : '';
  const subs         = ep.submissions || [];
  const isClosed     = ep.status !== 'open';
  const mySubId      = user ? (subs.find(s => s.author_id === user.user_id) || {}).sub_id : null;
  const maxVotes     = subs.length ? Math.max(...subs.map(s => Number(s.vote_count)||0)) : 0;

  // 이전 이야기 흐름
  const chainLines = [];
  if (storyOpening) chainLines.push(`<div style="display:flex;gap:10px;align-items:baseline;margin-bottom:8px"><span style="font-size:11px;color:var(--accent);font-weight:700;white-space:nowrap;min-width:36px">1단계</span><span style="font-size:14px;line-height:1.6">"${esc(storyOpening)}"</span></div>`);
  prevChain.forEach(p => chainLines.push(`<div style="display:flex;gap:10px;align-items:baseline;margin-bottom:8px"><span style="font-size:11px;color:var(--muted);white-space:nowrap;min-width:36px">${p.step+1}단계</span><span style="font-size:14px;line-height:1.6">"${esc(p.content)}"</span></div>`));

  document.getElementById('app').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="nav('story','${esc(ep.story_id)}')" style="margin-bottom:20px">← 스토리로</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <h2 style="margin:0">${Number(ep.step)+1}단계 이어쓰기</h2>
      <span class="story-status ${isClosed?'status-completed':'status-active'}">${isClosed?'마감':'투표 중'}</span>
      <span style="font-size:13px;color:var(--muted);margin-left:auto">참여자 ${ep.vote_total}명</span>
    </div>

    ${chainLines.length ? `
    <div class="card" style="margin-bottom:20px;border-color:#2a2a50">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:12px">지금까지의 이야기</div>
      ${chainLines.join('')}
      <div style="display:flex;gap:10px;align-items:baseline;margin-top:4px;padding-top:10px;border-top:1px solid var(--border)">
        <span style="font-size:11px;color:var(--accent);font-weight:700;white-space:nowrap;min-width:36px">${Number(ep.step)+1}단계</span>
        <span style="font-size:13px;color:var(--muted)">← 지금 이어쓰는 단계</span>
      </div>
    </div>` : ''}

    ${isClosed ? '' : user ? `
    <div class="card" style="margin-bottom:24px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">📝 내 문장 제출</div>
      ${mySubId ? `<div style="color:var(--muted);font-size:14px">이미 제출하셨습니다.</div>` : `
        <input type="text" id="sub-input" maxlength="50" placeholder="한 문장으로 이어가세요" oninput="updateCount('sub-input','sub-cc')" style="margin-bottom:6px">
        <div class="char-count" id="sub-cc" style="margin-bottom:10px">0자</div>
        <button class="btn btn-primary btn-sm" onclick="submitSub('${esc(episode_id)}')">제출</button>`}
    </div>` : `
    <div class="card" style="margin-bottom:24px;text-align:center">
      <span style="color:var(--muted)">참여하려면 </span>
      <button class="btn btn-ghost btn-sm" onclick="nav('auth','login')">로그인</button>이 필요합니다.
    </div>`}

    <div style="font-size:14px;font-weight:700;margin-bottom:12px">
      제출된 문장 ${subs.length}개
      ${!isClosed && user && mySubId ? `<span style="font-size:12px;color:var(--muted);margin-left:8px">최대 2개 선택 후 투표</span>` : ''}
    </div>
    <div id="sub-list">
      ${subs.length === 0 ? `<div class="empty" style="padding:32px 0">아직 제출된 문장이 없습니다.</div>` :
        subs.map(s => renderSubCard(s, isClosed, mySubId, maxVotes)).join('')}
    </div>
    ${!isClosed && user && mySubId ? `
    <div style="margin-top:16px;text-align:center">
      <button class="btn btn-primary" id="vote-btn" onclick="submitVote('${esc(episode_id)}')">선택한 문장에 투표</button>
    </div>` : ''}`;

  // 에피소드가 열려 있을 때만 실시간 리스너 부착
  if (!isClosed) {
    if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; }
    _epUnsubscribe = firebase.firestore()
      .collection('submissions')
      .where('episode_id', '==', episode_id)
      .onSnapshot(snap => {
        const list = document.getElementById('sub-list');
        if (!list) { if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; } return; }
        const freshSubs = snap.docs.map(d => ({ sub_id: d.id, ...d.data() }));
        const freshMax  = freshSubs.length ? Math.max(...freshSubs.map(s => Number(s.vote_count)||0)) : 0;
        list.innerHTML = freshSubs.length === 0
          ? `<div class="empty" style="padding:32px 0">아직 제출된 문장이 없습니다.</div>`
          : freshSubs.map(s => renderSubCard(s, false, mySubId, freshMax)).join('');
        // 투표 버튼 카운트 동기화
        const hdr = list.previousElementSibling;
        if (hdr) hdr.querySelector?.('.sub-count-label') && (hdr.querySelector('.sub-count-label').textContent = `제출된 문장 ${freshSubs.length}개`);
      }, () => { if (_epUnsubscribe) { _epUnsubscribe(); _epUnsubscribe = null; } });
  }
}

function renderSubCard(s, isClosed, mySubId, maxVotes) {
  const isAdopted  = s.is_adopted === true || s.is_adopted === 'TRUE';
  const sVoteCount = Number(s.vote_count) || 0;
  const barPct     = Math.min(Math.round(sVoteCount / FB_VOTE_THRESHOLD * 100), 100);
  const isClickable = !isClosed && s.sub_id !== mySubId;
  return `
    <div class="vote-card ${isAdopted?'adopted':''}" id="sc-${s.sub_id}"
      ${isClickable ? `onclick="toggleSub('${s.sub_id}')"` : ''} style="${isClickable?'cursor:pointer':''}">
      ${isAdopted ? `<div style="font-size:11px;color:var(--success);margin-bottom:4px">✓ 채택됨</div>` : ''}
      ${s.closing ? `<div style="font-size:10px;font-weight:700;color:var(--accent2);margin-bottom:6px;letter-spacing:.04em">◼ 닫는 이야기</div>` : `<div style="font-size:10px;font-weight:700;color:#68c8a8;margin-bottom:6px;letter-spacing:.04em">▶ 열린 이야기</div>`}
      <div class="vote-content">${esc(s.content)}</div>
      <div class="vote-meta">
        <span>✍ ${esc(s.author_id.slice(0,6))}...</span>
        <span class="vote-count">▲ ${sVoteCount}/${FB_VOTE_THRESHOLD}표</span>
        ${s.sub_id === mySubId ? '<span class="tag">내 제출</span>' : ''}
      </div>
      <div class="vote-bar"><div class="vote-fill" style="width:${barPct}%"></div></div>
    </div>`;
}

async function submitSub(episode_id) {
  const content = document.getElementById('sub-input').value.trim();
  if (!content) { toast('문장을 입력해주세요.', true); return; }
  if (content.length > 50) { toast('조금 더 짧게 써주세요.', true); return; }
  const res = await api('createSubmission', { episode_id, content, derived_from: '' });
  if (!res.ok) { toast(res.error, true); return; }
  _lsc.del('pop', 'done');
  toast('제출 완료!');
  episode();
}

async function submitVote(episode_id) {
  if (!selectedSubs.length) { toast('문장을 선택해주세요.', true); return; }
  const btn = document.getElementById('vote-btn');
  btn.disabled = true; btn.textContent = '투표 중...';
  const res = await api('vote', { episode_id, sub_ids: selectedSubs });
  if (!res.ok) { toast(res.error, true); btn.disabled = false; return; }

  episode();
}

    toast(`반갑습니다, ${dn}님! 오늘의 보너스 +${res.daily_bonus}p`);

let _dnCheckTimer;
async function checkDnAvail() {
  const el = document.getElementById('a-display');
  const status = document.getElementById('dn-status');
  if (!el || !status) return;
  const val = el.value.trim();
  status.textContent = '';
  clearTimeout(_dnCheckTimer);
  if (!val || val.length < 2) return;
  _dnCheckTimer = setTimeout(async () => {
    const res = await api('checkDisplayName', { display_name: val });
    if (!res.ok) return;
    status.textContent = res.available ? '✓ 사용가능' : '✗ 중복';
    status.style.color = res.available ? 'var(--success)' : 'var(--accent2)';
  }, 500);
}

async function doRegister() {
  const nickname    = document.getElementById('a-nick').value.trim();
  const displayName = (document.getElementById('a-display')?.value || '').trim();
  const nameVal     = (document.getElementById('a-name')?.value || '').trim();
  const password    = document.getElementById('a-pw').value;
  const password2   = document.getElementById('a-pw2').value;
  if (!/^[가-힣a-zA-Z0-9]{2,12}$/.test(nickname)) {
    toast('아이디는 2~12자, 한글·영문·숫자만 사용할 수 있어요.', true); return;
  }
  if (!displayName) {
    toast('닉네임을 입력해주세요.', true); return;
  }
  if (!nameVal) {
    toast('이름을 입력해주세요. (비밀번호 찾기에 사용됩니다)', true); return;
  }
  if (password.length < 8) {
    toast('비밀번호는 8자 이상이어야 해요.', true); return;
  }
  if (password !== password2) {
    toast('비밀번호가 일치하지 않아요.', true); return;
  }
  const res = await api('register', { nickname, password, name: nameVal, display_name: displayName });
  if (!res.ok) { toast(res.error, true); return; }
  saveUser(res);
  toast(`가입 완료! 환영합니다, ${res.display_name || res.nickname}님!`);
  nav('seed');
}

async function doRecover() {
  const nickname    = document.getElementById('a-nick').value.trim();
  const nameVal     = (document.getElementById('a-name')?.value || '').trim();
  const new_password  = document.getElementById('a-pw').value;
  const new_password2 = document.getElementById('a-pw2').value;
  if (!nickname || !nameVal) { toast('닉네임과 이름을 모두 입력해주세요.', true); return; }
  if (new_password.length < 8) { toast('새 비밀번호는 8자 이상이어야 해요.', true); return; }
  if (new_password !== new_password2) { toast('비밀번호가 일치하지 않아요.', true); return; }
  const res = await api('resetPassword', { nickname, name: nameVal, new_password });
  if (!res.ok) { toast(res.error, true); return; }
  toast('비밀번호가 재설정됐어요. 로그인해주세요.');
  nav('auth', 'login');
}
