<svg width="630" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="630" height="630" fill="#0d0f0e"/>

  <!-- card -->
  <rect x="55" y="80" width="520" height="470" rx="24" ry="24"
        fill="#1c2320" stroke="#283029" stroke-width="1.5"/>

  <!--
    화씨. → starts at x=175
    방    → starts at x=175+104 (씨와 같은 열, 화 한 글자 너비만큼 들여쓰기)
    두 줄 모두 흰색
  -->
  <text x="175" y="295"
        font-family="Georgia, 'Gowun Batang', serif"
        font-size="104" font-weight="400"
        fill="#e4ebe6">화씨.</text>

  <text x="279" y="407"
        font-family="Georgia, 'Gowun Batang', serif"
        font-size="104" font-weight="400"
        fill="#e4ebe6">방</text>

  <!-- tagline -->
  <text x="315" y="490"
        font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
        font-size="19" fill="#6b7d6e" text-anchor="middle">한 문장씩 이어가는 이야기 공간</text>
</svg>
