<svg width="630" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="630" height="630" fill="#0d0f0e"/>
  <!-- thin outer border -->
  <rect x="22" y="22" width="586" height="586" rx="32" ry="32"
        fill="#1c2320" stroke="#283029" stroke-width="1.5"/>

  <!--
    text-anchor="end" at same x=448:
    씨 spans 448-130=318 → 448
    방 spans 448-130=318 → 448
    씨와 방 좌우 모두 완벽히 정렬됨
  -->
  <text x="448" y="268"
        font-family="Georgia, 'Gowun Batang', serif"
        font-size="130" font-weight="400"
        fill="#e4ebe6" text-anchor="end">화씨</text>

  <text x="448" y="418"
        font-family="Georgia, 'Gowun Batang', serif"
        font-size="130" font-weight="400"
        fill="#e4ebe6" text-anchor="end">.방</text>

  <!-- tagline -->
  <text x="315" y="510"
        font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
        font-size="18" fill="#6b7d6e" text-anchor="middle">한 문장씩 이어가는 이야기 공간</text>
</svg>
