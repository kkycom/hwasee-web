<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화씨 (Hwasee)</title>
<meta name="description" content="모든 상상이 작품이 되는 곳, 화씨">
<meta name="google-adsense-account" content="ca-pub-7828331174769963">
<link rel="icon" type="image/png" href="/hwasee_sum.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f0e; color: #e4ebe6;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 40px 20px;
  }
  .logo img {
    height: 150px; width: auto; margin-bottom: 16px; display: block;
  }
  .copy-block {
    margin-bottom: 52px; text-align: center;
  }
  .headline {
    font-family: 'Gowun Batang', Georgia, serif;
    font-size: 15px; font-weight: 400; line-height: 1.9;
    color: #9aab9d; margin-bottom: 6px; letter-spacing: .03em;
  }
  .tagline {
    font-size: 12px; color: #4a5a4d; letter-spacing: .05em;
  }

  /* ── 제품 카드 */
  .products { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 400px; }

  .product-card {
    display: flex; align-items: center; gap: 20px;
    background: #1c2320; border: 1px solid #283029;
    border-radius: 14px; padding: 20px 24px; text-decoration: none; color: #e4ebe6;
    transition: border-color .15s, background .15s;
  }
  .product-card:hover { border-color: #80978c; background: #1e2922; }

  /* 비활성 카드 */
  .product-card.inactive {
    opacity: 0.35; pointer-events: none; cursor: default;
  }

  .product-logo {
    flex-shrink: 0;
  }
  .product-logo img {
    height: 76px; width: auto; display: block;
  }

  /* 우측 설명 */
  .product-info { flex: 1; }
  .product-desc { font-size: 13px; color: #6b7d6e; line-height: 1.65; }

  .product-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: #1a1a0a; color: #c8a96e; border: 1px solid rgba(200,169,110,.3);
    padding: 2px 8px; border-radius: 20px; margin-bottom: 6px;
  }

  footer { margin-top: 64px; font-size: 12px; color: #3a4a3d; text-align: center; }
  footer a { color: #3a4a3d; text-decoration: none; }
  footer a:hover { color: #6b7d6e; }
</style>
</head>
<body>
  <div class="logo"><img src="/hwasee.png" alt="화씨"></div>
  <div class="copy-block">
    <p class="headline">모든 이야기는 누군가의 머릿속에 있었다.</p>
    <p class="tagline">모든 상상이 작품이 되는 곳, 화씨</p>
  </div>

  <div class="products">

    <a class="product-card" href="/bang">
      <div class="product-logo">
        <img src="/bang/hwaseebang.png" alt="화씨.방">
      </div>
      <div class="product-info">
        <div class="product-desc">함께 써내려가는 이야기 공간.<br>한 문장씩, 이야기를 완성합니다.</div>
      </div>
    </a>

    <div class="product-card inactive">
      <div class="product-logo">
        <img src="/hwaseene.png" alt="화씨.네">
      </div>
      <div class="product-info">
        <div class="product-tag">준비 중</div>
        <div class="product-desc">곧 찾아옵니다.</div>
      </div>
    </div>

    <div class="product-card inactive">
      <div class="product-logo">
        <img src="/hwaseewon.png" alt="화씨.원">
      </div>
      <div class="product-info">
        <div class="product-tag">준비 중</div>
        <div class="product-desc">곧 찾아옵니다.</div>
      </div>
    </div>

  </div>

  <footer>
    © 2026 화씨 (Hwasee) &nbsp;·&nbsp;
    <a href="/bang/privacy.html">개인정보처리방침</a>
  </footer>
</body>
</html>
