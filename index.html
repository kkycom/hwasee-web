<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0d0d0d; color: #e8d5b0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    line-height: 1.7;
  }
  main { max-width: 720px; margin: 0 auto; padding: 64px 20px 80px; }
  .logo { font-size: 15px; letter-spacing: 4px; color: #e8d5b0; opacity: .85; margin-bottom: 28px; }
  h1 { font-size: 28px; margin: 0 0 14px; color: #f3e7cf; }
  .lede { font-size: 15px; color: #b8a888; max-width: 520px; margin: 0 0 48px; }
  .cards { display: grid; gap: 16px; }
  .card {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid #2a2620; border-radius: 12px; padding: 20px 22px;
    transition: border-color .2s, background .2s;
  }
  .card.live { border-color: #4a4030; }
  .card.live:hover { border-color: #e8d5b0; background: #141210; }
  .card-name { font-size: 17px; font-weight: 700; color: #f3e7cf; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: #9a8a6c; }
  .card-tag {
    display: inline-block; font-size: 11px; letter-spacing: .05em; padding: 2px 8px;
    border-radius: 10px; margin-left: 8px; vertical-align: middle;
  }
  .tag-live { background: #3a3020; color: #e8d5b0; }
  footer { margin-top: 64px; font-size: 12px; color: #5a5040; }
  footer a { color: #9a8a6c; }
</style>

<main>
  <div class="logo">화씨 HWASEE</div>
  <h1>이야기와 영상을 만드는 브랜드</h1>
  <p class="lede">
    화씨는 불꽃의 씨앗에서 이름을 땄습니다. 작은 문장 하나, 짧은 장면 하나가
    더 크게 번져나가길 바라는 마음으로 여러 프로젝트를 만들어가고 있습니다.
  </p>

  <div class="cards">
    <a class="card live" href="/bang/">
      <div class="card-name">화씨.방<span class="card-tag tag-live">서비스 중</span></div>
      <div class="card-desc">여러 사람이 한 문장씩 이어 쓰며 이야기를 완성하는 협업 창작 공간.</div>
    </a>
  </div>

  <footer>
    &copy; 2026 hwasee · <a href="mailto:kkycokr@gmail.com">kkycokr@gmail.com</a>
  </footer>
</main>
