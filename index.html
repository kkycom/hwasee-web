<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화씨 (Hwasee)</title>
<!-- Google AdSense 인증 태그 — 승인 후 아래 줄을 실제 태그로 교체 -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f0e; color: #e4ebe6;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 40px 20px;
  }
  .logo {
    font-family: 'Gowun Batang', Georgia, serif;
    font-size: 48px; font-weight: 700; letter-spacing: .04em;
    color: #e4ebe6; margin-bottom: 12px;
  }
  .tagline {
    font-size: 16px; color: #6b7d6e; margin-bottom: 48px; text-align: center;
  }
  .products { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
  .product-card {
    display: block; background: #1c2320; border: 1px solid #283029;
    border-radius: 12px; padding: 20px 24px; text-decoration: none; color: #e4ebe6;
    transition: border-color .15s, background .15s;
  }
  .product-card:hover { border-color: #68a882; background: #1e2922; }
  .product-name { font-family: 'Gowun Batang', Georgia, serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .product-desc { font-size: 13px; color: #6b7d6e; line-height: 1.6; }
  .product-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: #172a1c; color: #4ade80; border: 1px solid #16a34a;
    padding: 2px 8px; border-radius: 20px; margin-bottom: 8px;
  }
  footer { margin-top: 64px; font-size: 12px; color: #3a4a3d; text-align: center; }
  footer a { color: #3a4a3d; text-decoration: none; }
  footer a:hover { color: #6b7d6e; }
</style>
</head>
<body>
  <div class="logo">화씨</div>
  <p class="tagline">글과 이야기가 만나는 공간</p>

  <div class="products">
    <a class="product-card" href="/bang">
      <div class="product-tag">서비스 중</div>
      <div class="product-name">화씨.방</div>
      <div class="product-desc">함께 써내려가는 이야기 플랫폼.<br>한 문장씩, 이야기를 완성합니다.</div>
    </a>
  </div>

  <footer>
    © 2026 화씨 (Hwasee) &nbsp;·&nbsp;
    <a href="/bang/privacy.html">개인정보처리방침</a>
  </footer>
</body>
</html>
