<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --text-sub: #888;
  --text-muted: #555;
  --accent: #e8d5b0;
  --tag-bg: #1e1e1e;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ─── HERO ─── */
.hero {
  padding: 80px 48px 60px;
  max-width: 960px;
  margin: 0 auto;
  border-bottom: 1px solid var(--border);
}
.hero-name {
  font-size: 13px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}
.hero-title-ko {
  font-size: 52px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -.02em;
  margin-bottom: 6px;
}
.hero-title-en {
  font-size: 52px;
  font-weight: 300;
  line-height: 1.1;
  color: var(--text-sub);
  margin-bottom: 36px;
}
.hero-bio {
  font-size: 15px;
  color: var(--text-sub);
  line-height: 1.8;
  max-width: 520px;
}

/* ─── FILTER ─── */
.filter-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 48px 0;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-sub);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
}
.filter-btn:hover { border-color: var(--text-sub); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #0d0d0d; border-color: var(--accent); font-weight: 600; }

/* ─── GRID ─── */
.grid-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 48px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card:hover { border-color: #444; transform: translateY(-2px); }
.card.hidden { display: none; }

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.tag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 100px;
  background: var(--tag-bg);
  border: 1px solid var(--border);
  color: var(--text-sub);
}
.tag-format { color: var(--accent); border-color: #3a3020; background: #1e1a10; }
.badge-festival {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 100px;
  background: #0f2a1a;
  border: 1px solid #1e5c35;
  color: #4ade80;
}
.badge-wip {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 100px;
  background: #1a1a0f;
  border: 1px solid #4a4a1e;
  color: #aaa855;
}

.card-title-ko {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -.01em;
}
.card-title-en {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
  letter-spacing: .04em;
}

.card-synopsis {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.7;
  flex: 1;
}

.card-genre {
  font-size: 12px;
  color: var(--text-muted);
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 100;
  padding: 40px 24px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  max-width: 600px;
  width: 100%;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  background: var(--tag-bg);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text-sub);
  font-size: 13px;
  padding: 5px 12px;
  cursor: pointer;
}
.modal-close:hover { color: var(--text); }
.modal-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.modal-title-ko {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-bottom: 4px;
}
.modal-title-en {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
  letter-spacing: .04em;
}
.modal-genre {
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 16px;
}
.modal-synopsis {
  font-size: 15px;
  color: var(--text-sub);
  line-height: 1.9;
}
.modal-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}
.modal-detail-label {
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.modal-detail-text {
  font-size: 14px;
  color: var(--text-sub);
  line-height: 1.8;
}

/* ─── IMAGE SLIDER ─── */
.modal-slider {
  position: relative;
  margin-top: 24px;
  border-radius: 10px;
  overflow: hidden;
  background: #111;
  border: 1px solid var(--border);
}
.modal-slider img {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  display: block;
  cursor: pointer;
  transition: opacity .2s;
}
.modal-slider img:hover { opacity: .9; }
.slider-btn {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,.5);
  border: none;
  color: #fff;
  font-size: 22px;
  width: 40px; height: 40px;
  border-radius: 100px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.slider-btn:hover { background: rgba(0,0,0,.75); }
.slider-prev { left: 10px; }
.slider-next { right: 10px; }
.slider-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 10px 0 8px;
}
.slider-dot {
  width: 6px; height: 6px;
  border-radius: 100px;
  background: var(--border);
  transition: background .15s;
}
.slider-dot.active { background: var(--accent); }

.lightbox-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.lightbox-overlay.open { display: flex; }
.lightbox-overlay img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  object-fit: contain;
}
.lightbox-close {
  position: fixed;
  top: 20px; right: 24px;
  background: rgba(255,255,255,.1);
  border: none;
  color: #fff;
  font-size: 20px;
  width: 40px; height: 40px;
  border-radius: 100px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-prev, .lightbox-next {
  position: fixed;
  top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.1);
  border: none;
  color: #fff;
  font-size: 20px;
  width: 44px; height: 44px;
  border-radius: 100px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-prev { left: 20px; }
.lightbox-next { right: 20px; }

.modal-year {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
  letter-spacing: .06em;
}

/* ─── CREDITS ─── */
.modal-credits {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 16px;
  margin-top: 16px;
}
.credit-role {
  font-size: 11px;
  letter-spacing: .08em;
  color: var(--text-muted);
  white-space: nowrap;
  padding-top: 1px;
}
.credit-name {
  font-size: 13px;
  color: var(--text-sub);
}

/* ─── FOOTER ─── */
footer {
  border-top: 1px solid var(--border);
  padding: 32px 48px;
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
footer .copyright { font-size: 12px; color: var(--text-muted); }
footer .contact { font-size: 13px; color: var(--text-sub); }

@media (max-width: 640px) {
  .hero { padding: 48px 24px 40px; }
  .hero-title-ko, .hero-title-en { font-size: 36px; }
  .filter-wrap, .grid-wrap { padding-left: 24px; padding-right: 24px; }
  .grid-wrap { grid-template-columns: 1fr; }
  footer { padding: 24px; }
}
</style>
</head>

<!-- FOOTER -->
<footer>

// ─── RENDER ───
function renderGrid(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  WORKS.forEach((w, i) => {
    const show = filter === 'all' || w.format === filter;
    const card = document.createElement('div');
    card.className = 'card' + (show ? '' : ' hidden');
    card.onclick = () => openModal(i);
    card.innerHTML = `
      <div class="card-meta">
        <span class="tag tag-format">${w.format}</span>
        ${w.festival ? '<span class="badge-festival">영화제 출품</span>' : ''}
        ${w.wip ? '<span class="badge-wip">집필 중</span>' : ''}
      </div>
      <div>
        <div class="card-title-ko">${w.titleKo}</div>
        <div class="card-title-en">${w.titleEn}</div>
      </div>
      <div class="card-synopsis">${w.synopsis}</div>
      <div class="card-genre">${w.genre}</div>
    `;
    grid.appendChild(card);
  });
}

// ─── FILTER ───
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });
});

// ─── MODAL ───
function openModal(i) {
  const w = WORKS[i];
  document.getElementById('modalMeta').innerHTML = `
    <span class="tag tag-format">${w.format}</span>
    ${w.festival ? '<span class="badge-festival">영화제 출품</span>' : ''}
    ${w.wip ? '<span class="badge-wip">집필 중</span>' : ''}
  `;
  document.getElementById('modalTitleKo').textContent = w.titleKo;
  document.getElementById('modalTitleEn').textContent = w.titleEn;
  document.getElementById('modalYear').textContent = w.year || '';
  document.getElementById('modalGenre').textContent = w.genre;

  const sliderWrap = document.getElementById('modalSliderWrap');
  if (w.images && w.images.length) {
    _sliderImages = w.images;
    _sliderIdx = 0;
    sliderRender();
    sliderWrap.style.display = 'block';
    // 단일 이미지면 화살표 숨김
    const btns = document.querySelectorAll('.slider-btn');
    btns.forEach(b => b.style.display = w.images.length > 1 ? 'flex' : 'none');
  } else {
    sliderWrap.style.display = 'none';
  }

  document.getElementById('modalSynopsis').innerHTML = w.synopsis + (w.synopsisEn ? `<br><br><span style="font-size:13px;color:#666">${w.synopsisEn}</span>` : '');
  document.getElementById('modalNote').textContent = w.note;

  const creditsWrap = document.getElementById('modalCreditsWrap');
  const creditsEl = document.getElementById('modalCredits');
  if (w.credits && w.credits.length) {
    creditsEl.innerHTML = w.credits.map(c =>
      `<span class="credit-role">${c.role}</span><span class="credit-name">${c.name}</span>`
    ).join('');
    creditsWrap.style.display = 'block';
  } else {
    creditsWrap.style.display = 'none';
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── SLIDER ───
let _sliderImages = [], _sliderIdx = 0;
function sliderRender() {
  document.getElementById('sliderImg').src = _sliderImages[_sliderIdx];
  const dots = document.getElementById('sliderDots');
  dots.innerHTML = _sliderImages.map((_, i) =>
    `<span class="slider-dot${i === _sliderIdx ? ' active' : ''}"></span>`
  ).join('');
  dots.style.display = _sliderImages.length > 1 ? 'flex' : 'none';
}
function sliderNav(dir) {
  _sliderIdx = (_sliderIdx + dir + _sliderImages.length) % _sliderImages.length;
  sliderRender();
}
function openLightboxFromSlider() {
  openLightbox(_sliderImages, _sliderIdx);
}

// ─── LIGHTBOX ───
let _lbImages = [], _lbIdx = 0;
function openLightbox(images, idx) {
  _lbImages = images; _lbIdx = idx;
  document.getElementById('lightboxImg').src = images[idx];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function lightboxNav(dir) {
  _lbIdx = (_lbIdx + dir + _lbImages.length) % _lbImages.length;
  document.getElementById('lightboxImg').src = _lbImages[_lbIdx];
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeModalBtn(); }
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

// ─── INIT ───
renderGrid('all');
</script>
